<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF-AI OMNI-CORE v2</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --chat-bg: #161b22;
            --accent: #58a6ff;
            --text: #e6edf3;
            --code-border: #30363d; /* Pembatas pemrograman */
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            overflow: hidden;
        }

        /* --- LOGIN SCREEN (WITH LOGO) --- */
        #login-page {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .logo-box img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
            margin-bottom: 25px;
        }

        .login-container {
            background: var(--chat-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--code-border);
            text-align: center;
            width: 320px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0d1117;
            border: 1px solid var(--code-border);
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button.btn-login {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button.btn-login:hover { filter: brightness(1.2); }

        /* --- CHAT INTERFACE --- */
        #main-system {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        header {
            padding: 15px 25px;
            background: var(--chat-bg);
            border-bottom: 1px solid var(--code-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* PEMBATAS PEMROGRAMAN (ANTI TEMBUS) */
        pre {
            background: #000 !important;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid var(--accent); /* Warna tegas agar terlihat batasnya */
            overflow-x: auto;
            margin: 15px 0;
            position: relative;
            display: block;
        }

        code { font-family: 'Fira Code', 'Consolas', monospace; font-size: 0.9em; }

        .bubble { max-width: 80%; padding: 14px; border-radius: 15px; line-height: 1.6; }
        .user { align-self: flex-end; background: #238636; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--chat-bg); border: 1px solid var(--code-border); border-bottom-left-radius: 2px; }

        .img-result { max-width: 100%; border-radius: 12px; margin-top: 10px; border: 2px solid var(--accent); }

        .input-box {
            padding: 20px;
            background: var(--chat-bg);
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--code-border);
        }
    </style>
</head>
<body>

<div id="login-page">
    <div class="logo-box">
        <img src="https://i.postimg.cc/4xr9PgN1/file-00000000aa9471fabbcb615488cb4b8a.png" alt="RHF Logo">
    </div>
    <div class="login-container">
        <h2 style="margin-top: 0; color: var(--accent);">RHF ACCESS</h2>
        <input type="email" id="email" placeholder="Architect Email...">
        <input type="password" id="password" placeholder="System Key...">
        <button class="btn-login" onclick="login()">ENTER OMNI-CORE</button>
    </div>
</div>

<div id="main-system">
    <header>
        <span style="font-weight: bold; letter-spacing: 1px;">RHF-AI v2.1</span>
        <button onclick="logout()" style="background: #da3633; border: none; color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer;">LOGOUT</button>
    </header>

    <div id="chat-flow"></div>

    <div class="input-box">
        <input type="text" id="msgInput" placeholder="Command or /img..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" style="width: 80px; background: var(--accent); border: none; color: white; border-radius: 8px; cursor: pointer;">SEND</button>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG (VITE VERSION) ---
    const firebaseConfig = {
        apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
        authDomain: `${import.meta.env.VITE_FIREBASE_PROJECT_ID}.firebaseapp.com`,
        projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
        storageBucket: `${import.meta.env.VITE_FIREBASE_PROJECT_ID}.appspot.com`,
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // AUTH LOGIC
    async function login() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        try {
            await auth.signInWithEmailAndPassword(e, p);
        } catch (err) { alert("Error: " + err.message); }
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-system').style.display = 'flex';
        }
    });

    // CHAT ENGINE
    async function send() {
        const input = document.getElementById('msgInput');
        const val = input.value.trim();
        if(!val) return;

        addBubble('user', val);
        input.value = '';

        const isImg = val.startsWith('/img ');
        const prompt = isImg ? val.replace('/img ', '') : val;

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pesan: prompt, isImage: isImg })
            });
            const data = await res.json();
            
            if(data.type === 'image') addImg(data.reply);
            else addBubble('ai', data.reply);
        } catch (e) { addBubble('ai', '⚠️ Transmisi Terputus!'); }
    }

    function addBubble(sender, text) {
        const flow = document.getElementById('chat-flow');
        const div = document.createElement('div');
        div.className = `bubble ${sender}`;
        
        if(sender === 'ai') {
            div.innerHTML = marked.parse(text);
            div.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
        } else {
            div.textContent = text;
        }
        
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }

    function addImg(url) {
        const flow = document.getElementById('chat-flow');
        const img = document.createElement('img');
        img.src = url;
        img.className = 'img-result';
        flow.appendChild(img);
        flow.scrollTop = flow.scrollHeight;
    }
</script>
</body>
</html>

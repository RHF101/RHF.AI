<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RHF OMNI-CORE PRO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --chat-bg: #161b22;
            --sidebar-bg: #010409;
            --accent: #58a6ff;
            --border: #30363d;
            --text: #e6edf3;
            --user-msg: #238636;
            --ai-msg: #21262d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex;
        }

        /* --- LOGIN --- */
        #login-page {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 3000;
        }
        .logo-box img { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 25px; }
        .btn-google {
            background: white; color: black; border: none; padding: 12px 24px; 
            border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            height: 100%; position: absolute; left: -260px; z-index: 2000; transition: 0.3s;
        }
        #sidebar.open { left: 0; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); font-weight: bold; color: var(--accent); }

        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1500; }
        #overlay.open { display: block; }

        /* --- MAIN --- */
        #main-system { flex: 1; display: none; flex-direction: column; height: 100%; position: relative; }

        header {
            height: 60px; padding: 0 15px; background: var(--chat-bg); 
            border-bottom: 1px solid var(--border); display: flex; align-items: center;
        }
        .menu-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; padding: 0; margin-right: 15px; }
        .header-title { font-weight: 700; font-size: 14px; flex: 1; text-align: center; color: var(--accent); letter-spacing: 1px; }

        #chat-flow {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px;
            padding-bottom: 120px;
        }

        /* BUBBLE & TEEKS BATS */
        .bubble { 
            max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; 
            position: relative; word-wrap: break-word; border: 1px solid transparent;
        }
        .user { align-self: flex-end; background: var(--user-msg); border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--ai-msg); border-color: var(--border); border-bottom-left-radius: 2px; }

        /* CODE BOX & COPY */
        .code-container { position: relative; margin: 10px 0; border: 1px solid var(--accent); border-radius: 8px; overflow: hidden; }
        pre { background: #000 !important; padding: 15px; margin: 0; overflow-x: auto; }
        code { font-family: 'Fira Code', monospace; font-size: 12px; }
        .copy-btn {
            position: absolute; top: 5px; right: 5px; background: #30363d; border: 1px solid var(--border);
            color: #8b949e; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer;
        }

        /* --- INPUT --- */
        .input-area {
            position: absolute; bottom: 0; width: 100%; padding: 15px;
            background: var(--bg); border-top: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }

        .btn-plus { 
            color: #8b949e; font-size: 22px; cursor: pointer; font-weight: 300; 
            background: none; border: none; padding: 0;
        }
        
        input[type="text"] {
            flex: 1; background: #0d1117; border: 1px solid var(--border);
            padding: 10px 15px; border-radius: 6px; color: white; outline: none; font-size: 14px;
        }

        .btn-img { 
            color: #8b949e; font-size: 11px; font-weight: 700; border: 1px solid var(--border);
            padding: 5px 8px; border-radius: 4px; cursor: pointer; background: none;
        }
        .btn-img.active { color: var(--accent); border-color: var(--accent); }

        .btn-send { color: var(--accent); font-weight: 700; font-size: 13px; background: none; border: none; cursor: pointer; }

        @media (max-width: 600px) {
            .bubble { max-width: 92%; font-size: 13.5px; }
            .input-area { padding: 10px; gap: 8px; }
        }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleSidebar()"></div>

<div id="login-page">
    <div class="logo-box">
        <img src="https://i.postimg.cc/4xr9PgN1/file-00000000aa9471fabbcb615488cb4b8a.png" alt="RHF Logo">
    </div>
    <button class="btn-google" id="loginBtn">AUTH WITH GOOGLE</button>
</div>

<div id="sidebar">
    <div class="sidebar-header">SESSIONS</div>
    <div id="sessionList" style="padding: 10px; font-size: 12px; color: #8b949e;">No previous logs</div>
</div>

<div id="main-system">
    <header>
        <button class="menu-btn" onclick="toggleSidebar()">|||</button>
        <div class="header-title">OMNI-CORE V4.1</div>
        <img id="uImg" src="" style="width:28px; height:28px; border-radius:50%; border:1px solid var(--accent); cursor:pointer;" onclick="auth.signOut()">
    </header>

    <div id="chat-flow"></div>

    <div class="input-area">
        <label class="btn-plus">
            + <input type="file" id="fileInput" hidden onchange="handleFile(this)">
        </label>
        
        <input type="text" id="msgInput" placeholder="SYSTEM PROMPT..." autocomplete="off">
        
        <button class="btn-img" id="imgModeBtn" onclick="toggleImgMode()">IMG</button>
        <button class="btn-send" id="sendBtn">SEND</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDNFXLa8WGAqhLnc8RrLLTgP3nLWvXkd1w",
        authDomain: "rhf-confrims.firebaseapp.com",
        projectId: "rhf-confrims",
        storageBucket: "rhf-confrims.firebasestorage.app",
        messagingSenderId: "631231605918",
        appId: "1:631231605918:web:d42d4e34e9ea14b2d65f8f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let isImageMode = false;
    let fileContent = "";

    window.toggleSidebar = () => {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
    };

    window.toggleImgMode = () => {
        isImageMode = !isImageMode;
        document.getElementById('imgModeBtn').classList.toggle('active');
    };

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-system').style.display = 'flex';
            document.getElementById('uImg').src = user.photoURL;
            loadHistory(user.uid);
        }
    });

    function loadHistory(uid) {
        const q = query(collection(db, "chats"), where("uid", "==", uid), orderBy("time", "asc"));
        onSnapshot(q, (snap) => {
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = '';
            snap.forEach(doc => render(doc.data().sender, doc.data().msg));
        });
    }

    window.handleFile = (input) => {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                fileContent = `[FILE: ${file.name}]\n${e.target.result}\n[EOF]`; 
                render('user', `Attached: ${file.name}`);
            };
            reader.readAsText(file);
        }
    };

    async function send() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text && !fileContent) return;

        input.value = '';
        const prompt = fileContent ? `${fileContent}\n${text}` : text;
        const imgState = isImageMode;
        if(imgState) toggleImgMode();

        await addDoc(collection(db, "chats"), {
            uid: auth.currentUser.uid,
            sender: 'user',
            msg: text || "File Uploaded",
            time: serverTimestamp()
        });

        fileContent = "";

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ pesan: prompt, isImage: imgState })
            });
            const data = await res.json();
            const reply = data.type === 'image' ? `![img](${data.reply})` : data.reply;
            
            await addDoc(collection(db, "chats"), {
                uid: auth.currentUser.uid,
                sender: 'ai',
                msg: reply,
                time: serverTimestamp()
            });
        } catch (e) { console.error("Signal lost"); }
    }

    document.getElementById('sendBtn').onclick = send;
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') send(); };

    function render(sender, content) {
        const flow = document.getElementById('chat-flow');
        const div = document.createElement('div');
        div.className = `bubble ${sender}`;
        
        if(sender === 'ai') {
            div.innerHTML = marked.parse(content);
            div.querySelectorAll('pre').forEach(pre => {
                const container = document.createElement('div');
                container.className = 'code-container';
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.textContent = 'COPY';
                
                pre.parentNode.insertBefore(container, pre);
                container.appendChild(pre);
                container.appendChild(btn);

                const code = pre.querySelector('code');
                hljs.highlightElement(code);
                btn.onclick = () => {
                    navigator.clipboard.writeText(code.textContent);
                    btn.textContent = 'DONE';
                    setTimeout(() => btn.textContent = 'COPY', 1500);
                };
            });
        } else {
            div.textContent = content;
        }
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }
</script>
</body>
</html>

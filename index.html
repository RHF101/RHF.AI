<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF-AI Omni-Core v2</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0d1117;
            --chat-bg: #161b22;
            --user-bubble: #238636;
            --ai-bubble: #21262d;
            --text-color: #e6edf3;
            --accent: #58a6ff;
            --border-code: #30363d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Login Screen (Tetap Ada) */
        #login-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        /* Container Chat */
        header {
            padding: 15px;
            background: var(--chat-bg);
            text-align: center;
            border-bottom: 1px solid #30363d;
            color: var(--accent);
            font-weight: bold;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* PEMBATAS & KOTAK KODE (Anti Tembus) */
        pre {
            background: #000 !important;
            padding: 15px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 15px 0;
            border: 2px solid var(--border-code); /* Pembatas Tegas */
            position: relative;
            display: block;
            max-width: 100%;
            white-space: pre; /* Menjaga struktur kode */
        }

        code {
            font-family: 'Consolas', monospace;
            font-size: 0.9em;
            color: #d1d5db;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.6;
        }

        .user-message { align-self: flex-end; background-color: var(--user-bubble); }
        .ai-message { align-self: flex-start; background-color: var(--ai-bubble); border: 1px solid #30363d; }

        /* Fitur Gambar */
        .ai-image {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            border: 2px solid var(--accent);
        }

        .input-area {
            padding: 20px;
            background: var(--chat-bg);
            display: flex;
            gap: 10px;
            border-top: 1px solid #30363d;
        }

        input { flex: 1; background: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 8px; color: white; }
        button { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>RHF-AI ACCESS</h2>
    <input type="password" id="passInput" placeholder="Enter System Key...">
    <button onclick="checkLogin()" style="margin-top: 10px; height: 40px;">LOGIN</button>
</div>

<header>RHF-AI OMNI-CORE v2</header>

<div id="chat-container"></div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Tanya atau ketik '/img [prompt]' untuk gambar..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">KIRIM</button>
</div>

<script>
    // Sistem Login
    function checkLogin() {
        const pass = document.getElementById('passInput').value;
        if(pass === "radit123") { // Ganti password sesukamu
            document.getElementById('login-screen').style.display = 'none';
        } else {
            alert("Akses Ditolak!");
        }
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        appendMessage('user', text);
        input.value = '';

        // Deteksi Perintah Gambar
        let isImg = false;
        let promptPesan = text;
        if(text.startsWith('/img ')) {
            isImg = true;
            promptPesan = text.replace('/img ', '');
        }

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pesan: promptPesan, isImage: isImg })
            });

            const data = await response.json();
            
            if(data.type === "image") {
                appendImage(data.reply);
            } else {
                appendMessage('ai', data.reply);
            }
        } catch (e) {
            appendMessage('ai', 'Error transmisi!');
        }
    }

    function appendMessage(sender, content) {
        const div = document.createElement('div');
        div.className = `message ${sender}-message`;
        if(sender === 'ai') {
            div.innerHTML = marked.parse(content);
            div.querySelectorAll('pre code').forEach((el) => hljs.highlightElement(el));
        } else {
            div.textContent = content;
        }
        document.getElementById('chat-container').appendChild(div);
        document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
    }

    function appendImage(url) {
        const img = document.createElement('img');
        img.src = url;
        img.className = 'ai-image';
        document.getElementById('chat-container').appendChild(img);
    }
</script>
</body>
</html>

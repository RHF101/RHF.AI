<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RHF-AI OMNI-CORE v3</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --chat-bg: #161b22;
            --accent: #58a6ff;
            --user-bbl: #238636;
            --ai-bbl: #21262d;
            --text: #e6edf3;
            --border: #30363d;
        }

        body { 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; display: flex; flex-direction: column; height: 100vh;
        }

        /* --- RESPONSIVE LOGIN --- */
        #login-page {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
        .logo-box img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 20px; }
        .btn-google {
            display: flex; align-items: center; gap: 10px; background: white; color: black;
            border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer;
        }

        /* --- MAIN INTERFACE --- */
        #main-system { display: none; flex-direction: column; height: 100%; }

        header {
            padding: 12px 20px; background: var(--chat-bg); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .status-pill { background: rgba(88, 166, 255, 0.1); color: var(--accent); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; border: 1px solid var(--accent); }

        /* --- CHAT FLOW (SMOOTH SCROLL) --- */
        #chat-flow {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px;
            scroll-behavior: smooth;
        }

        /* BUBBLE CHAT & GUARD CODE */
        .bubble { max-width: 85%; padding: 14px 18px; border-radius: 18px; line-height: 1.6; font-size: 15px; position: relative; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--user-bbl); border-bottom-right-radius: 4px; color: white; }
        .ai { align-self: flex-start; background: var(--ai-bbl); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        pre {
            background: #000 !important; padding: 16px; border-radius: 12px;
            border: 2px solid var(--accent); overflow-x: auto; margin: 12px 0;
            position: relative;
        }
        code { font-family: 'Fira Code', 'Consolas', monospace; font-size: 13px; color: #d1d5db; }

        /* --- INPUT AREA --- */
        .input-container {
            padding: 15px; background: var(--chat-bg); border-top: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 10px;
        }
        .toolbar { display: flex; gap: 10px; align-items: center; }
        .input-row { display: flex; gap: 10px; }
        
        input[type="text"] {
            flex: 1; background: #0d1117; border: 1px solid var(--border);
            padding: 12px 16px; border-radius: 12px; color: white; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(88,166,255,0.2); }

        .btn-action { background: var(--accent); border: none; color: white; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .btn-file { background: #30363d; border: 1px solid var(--border); color: #8b949e; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 18px; }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 600px) {
            .bubble { max-width: 90%; font-size: 14px; }
            header span { font-size: 14px; }
            .btn-action { padding: 12px 15px; }
        }
    </style>
</head>
<body>

<div id="login-page">
    <div class="logo-box">
        <img src="https://i.postimg.cc/4xr9PgN1/file-00000000aa9471fabbcb615488cb4b8a.png" alt="RHF Logo">
    </div>
    <button class="btn-google" id="loginBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
        Enter Omni-Core System
    </button>
</div>

<div id="main-system">
    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <span class="status-pill">ONLINE</span>
            <span style="font-weight: bold;">RHF-AI v3.0</span>
        </div>
        <img id="uImg" src="" style="width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent); cursor: pointer;" onclick="auth.signOut()">
    </header>

    <div id="chat-flow"></div>

    <div class="input-container">
        <div class="toolbar">
            <label class="btn-file" title="Upload File (Target 4)">
                📁 <input type="file" id="fileInput" hidden onchange="handleFile(this)">
            </label>
            <span id="fileName" style="font-size: 11px; color: var(--accent);"></span>
        </div>
        <div class="input-row">
            <input type="text" id="msgInput" placeholder="Tanya apapun, debug kode, atau buat gambar..." autocomplete="off">
            <button class="btn-action" id="sendBtn">SEND</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where, limit } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDNFXLa8WGAqhLnc8RrLLTgP3nLWvXkd1w",
        authDomain: "rhf-confrims.firebaseapp.com",
        projectId: "rhf-confrims",
        storageBucket: "rhf-confrims.firebasestorage.app",
        messagingSenderId: "631231605918",
        appId: "1:631231605918:web:d42d4e34e9ea14b2d65f8f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let chatMemory = []; // Context Memory (Target 1 & 2)
    let currentFileContent = ""; 

    // AUTH HANDLING
    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-system').style.display = 'flex';
            document.getElementById('uImg').src = user.photoURL || "https://i.postimg.cc/4xr9PgN1/file.png";
            loadMessages(user.uid);
        }
    });

    // LOAD MEMORY FROM FIRESTORE
    function loadMessages(uid) {
        const q = query(collection(db, "chats"), where("uid", "==", uid), orderBy("time", "asc"));
        onSnapshot(q, (snap) => {
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = '';
            chatMemory = []; // Reset memory and refill
            snap.forEach(doc => {
                const d = doc.data();
                appendUI(d.sender, d.msg);
                chatMemory.push({ role: d.sender === 'user' ? 'user' : 'assistant', content: d.msg });
            });
        });
    }

    // FILE UNDERSTANDING (Target 4)
    window.handleFile = (input) => {
        const file = input.files[0];
        if (file) {
            document.getElementById('fileName').textContent = `📄 ${file.name}`;
            const reader = new FileReader();
            reader.onload = (e) => { currentFileContent = e.target.result; };
            reader.readAsText(file);
        }
    };

    // SEND ENGINE (REASONING & MULTI-STEP)
    async function send() {
        const input = document.getElementById('msgInput');
        let text = input.value.trim();
        if(!text) return;

        input.value = '';
        const fullMsg = currentFileContent ? `Context File:\n${currentFileContent}\n\nPertanyaan: ${text}` : text;
        
        // Simpan ke Firestore (Target 2)
        await addDoc(collection(db, "chats"), {
            uid: auth.currentUser.uid,
            sender: 'user',
            msg: text,
            time: serverTimestamp()
        });

        // Tampilkan Loading
        appendUI('ai', '...sedang berpikir logis...');

        try {
            const isImg = text.startsWith('/img ');
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    pesan: isImg ? text.replace('/img ', '') : fullMsg, 
                    isImage: isImg,
                    history: chatMemory.slice(-6) // Kirim 6 pesan terakhir sebagai memori (Target 1)
                })
            });
            
            const data = await res.json();
            currentFileContent = ""; // Reset file context after send
            document.getElementById('fileName').textContent = "";

            const finalReply = data.type === 'image' ? `![img](${data.reply})` : data.reply;
            
            await addDoc(collection(db, "chats"), {
                uid: auth.currentUser.uid,
                sender: 'ai',
                msg: finalReply,
                time: serverTimestamp()
            });

        } catch (e) {
            console.error(e);
        }
    }

    document.getElementById('sendBtn').onclick = send;
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') send(); };

    function appendUI(sender, content) {
        const flow = document.getElementById('chat-flow');
        // Remove loading message if exists
        const loadings = flow.querySelectorAll('.ai');
        loadings.forEach(l => { if(l.textContent === '...sedang berpikir logis...') l.remove(); });

        const div = document.createElement('div');
        div.className = `bubble ${sender}`;
        
        if(sender === 'ai') {
            div.innerHTML = marked.parse(content);
            div.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
        } else {
            div.textContent = content;
        }
        
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF-AI OMNI-CORE v2</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --chat-bg: #161b22;
            --accent: #58a6ff;
            --text: #e6edf3;
            --code-border: #30363d;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            overflow: hidden;
        }

        /* --- LOGIN SCREEN --- */
        #login-page {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .logo-box img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            margin-bottom: 30px;
        }

        .login-container {
            background: var(--chat-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--code-border);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-google {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-google:hover { background: #e1e1e1; }

        /* --- CHAT INTERFACE --- */
        #main-system {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        header {
            padding: 10px 20px;
            background: var(--chat-bg);
            border-bottom: 1px solid var(--code-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-info img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); }

        #chat-flow {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* PEMBATAS PEMROGRAMAN (ANTI TEMBUS) */
        pre {
            background: #000 !important;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid var(--accent);
            overflow-x: auto;
            margin: 15px 0;
            display: block;
            max-width: 100%;
        }

        .bubble { max-width: 80%; padding: 14px; border-radius: 15px; line-height: 1.6; }
        .user { align-self: flex-end; background: #238636; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--chat-bg); border: 1px solid var(--code-border); }

        .input-box {
            padding: 20px;
            background: var(--chat-bg);
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--code-border);
        }

        input#msgInput { flex: 1; background: #0d1117; border: 1px solid var(--code-border); padding: 12px; border-radius: 8px; color: white; }
    </style>
</head>
<body>

<div id="login-page">
    <div class="logo-box">
        <img src="https://i.postimg.cc/4xr9PgN1/file-00000000aa9471fabbcb615488cb4b8a.png" alt="RHF Logo">
    </div>
    <div class="login-container">
        <h2 style="color: var(--accent); margin-top: 0;">RHF OMNI-CORE</h2>
        <button class="btn-google" onclick="loginGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Sign in with Google
        </button>
    </div>
</div>

            <button onclick="logout()" style="background:#da3633; border:none; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">Exit</button>
        </div>
    </header>

    <div id="chat-flow"></div>

    <div class="input-box">
        <input type="text" id="msgInput" placeholder="Kirim pesan atau /img untuk gambar..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" style="background:var(--accent); border:none; color:white; border-radius:8px; cursor:pointer; width:70px;">SEND</button>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG (VITE) ---
    const firebaseConfig = {
        apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
        authDomain: `${import.meta.env.VITE_FIREBASE_PROJECT_ID}.firebaseapp.com`,
        projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // AUTH FUNCTIONS
    function loginGoogle() {
        auth.signInWithPopup(provider).catch(e => alert(e.message));
    }

    function logout() {
        auth.signOut().then(() => location.reload());
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-system').style.display = 'flex';
            document.getElementById('userName').textContent = user.displayName;
            // Jika ada foto dari Google, pakai itu. Kalau nggak, pakai base64 dekorasi.
            if(user.photoURL) document.getElementById('userImg').src = user.photoURL;
        }
    });

    // CHAT ENGINE
    async function send() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text) return;

        append('user', text);
        input.value = '';

        const isImg = text.startsWith('/img ');
        const query = isImg ? text.replace('/img ', '') : text;

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pesan: query, isImage: isImg })
            });
            const data = await res.json();
            if(data.type === 'image') appendImg(data.reply);
            else append('ai', data.reply);
        } catch (e) { append('ai', '⚠️ Transmisi ERROR!'); }
    }

    function append(sender, content) {
        const flow = document.getElementById('chat-flow');
        const div = document.createElement('div');
        div.className = `bubble ${sender}`;
        if(sender === 'ai') {
            div.innerHTML = marked.parse(content);
            div.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
        } else { div.textContent = content; }
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }

    function appendImg(url) {
        const flow = document.getElementById('chat-flow');
        const img = document.createElement('img');
        img.src = url;
        img.style.maxWidth = '100%';
        img.style.borderRadius = '10px';
        img.style.marginTop = '10px';
        flow.appendChild(img);
        flow.scrollTop = flow.scrollHeight;
    }
</script>
</body>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF-AI Controller</title>
    <style>
        body { background: #0b0b0b; color: #00ffcc; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; box-shadow: 0 0 20px rgba(0,255,204,0.1); }
        input { background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 5px; margin-bottom: 10px; width: 80%; }
        button { background: #00ffcc; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #controller { display: none; } /* Tersembunyi sebelum login */
    </style>
</head>
<body>

    <div id="login-panel" class="box">
        <h2>RHF-AI ACCESS</h2>
        <input type="password" id="pass" placeholder="Masukkan Kode Akses">
        <br>
        <button onclick="cekAkses()">UNLOCK</button>
    </div>

    <div id="controller" class="box">
        <h2>Remote Game Controller</h2>
        <input type="text" id="perintah" placeholder="Suruh AI ngerakit apa?">
        <br>
        <button onclick="kirimKeAI()">KIRIM PERINTAH</button>
        <p id="status" style="font-size: 12px; color: #888;"></p>
    </div>

    <script>
        // PASSWORD RAHASIA KAMU
        const KODE_RAHASIA = "RHF101_DEWA"; 

        function cekAkses() {
            let input = document.getElementById('pass').value;
            if (input === KODE_RAHASIA) {
                document.getElementById('login-panel').style.display = 'none';
                document.getElementById('controller').style.display = 'block';
            } else {
                alert("KODE SALAH! Akses Ditolak.");
            }
        }

        async function kirimKeAI() {
            let pesan = document.getElementById('perintah').value;
            document.getElementById('status').innerText = "AI sedang berpikir...";
            
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pesan: pesan })
            });
            const data = await res.json();
            document.getElementById('status').innerText = "Selesai: " + data.reply;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RHF OMNI-CORE Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --chat-bg: #161b22;
            --sidebar-bg: #010409;
            --accent: #58a6ff;
            --border: #30363d;
            --text: #e6edf3;
            --user-msg: #238636;
            --ai-msg: #21262d;
            --header-h: 60px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex;
        }

        /* --- LOGIN & LOGO --- */
        #login-page {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 3000;
            padding: 20px;
        }
        .logo-box img { width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--accent); margin-bottom: 30px; box-shadow: 0 0 25px rgba(88,166,255,0.3); }
        .btn-google {
            display: flex; align-items: center; gap: 12px; background: white; color: black;
            border: none; padding: 14px 28px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 16px;
        }

        /* --- SIDEBAR LAYER (Target 2) --- */
        #sidebar {
            width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            height: 100%; display: flex; flex-direction: column;
            position: absolute; left: -280px; top: 0; z-index: 2000; transition: 0.3s ease;
        }
        #sidebar.open { left: 0; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item { padding: 12px; border-radius: 8px; cursor: pointer; font-size: 14px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item:hover, .chat-item.active { background: rgba(255,255,255,0.05); }

        /* Overlay */
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; }
        #overlay.open { display: block; }

        /* --- MAIN SYSTEM --- */
        #main-system { flex: 1; display: none; flex-direction: column; height: 100%; position: relative; }

        header {
            height: var(--header-h); padding: 0 15px; background: var(--chat-bg); 
            border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px;
            position: sticky; top: 0; z-index: 1000;
        }
        .menu-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 0; }
        .header-title { font-weight: 700; font-size: 16px; letter-spacing: 0.5px; flex: 1; text-align: center; color: var(--accent); }

        /* --- CHAT FLOW --- */
        #chat-flow {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px;
            scroll-behavior: smooth; padding-bottom: 100px; /* Space for input */
        }

        /* BUBBLE & TEEKS BATS */
        .bubble { max-width: 85%; padding: 14px 18px; border-radius: 18px; line-height: 1.6; font-size: 15px; position: relative; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--user-msg); border-bottom-right-radius: 4px; color: white; }
        .ai { align-self: flex-start; background: var(--ai-msg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        /* CODINGAN & TOMBOL SALIN */
        .code-container { position: relative; margin: 15px 0; }
        pre {
            background: #000 !important; padding: 16px; border-radius: 12px;
            border: 2px solid var(--accent); overflow-x: auto; margin: 0; display: block;
        }
        code { font-family: 'Fira Code', monospace; font-size: 13px; color: #d1d5db; }
        .copy-btn {
            position: absolute; top: 8px; right: 8px;
            background: rgba(255,255,255,0.1); border: 1px solid var(--border); color: #8b949e;
            padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: 600; z-index: 10;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.2); color: white; }

        /* --- INPUT AREA PRO --- */
        .input-area {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 15px; background: var(--bg); border-top: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px; z-index: 1100;
        }

        .icon-btn { 
            background: none; border: none; color: #8b949e; font-size: 20px; cursor: pointer; 
            padding: 5px; transition: 0.2s;
        }
        .icon-btn:hover { color: var(--accent); }
        .icon-btn.active { color: var(--accent); }

        input[type="text"] {
            flex: 1; background: #0d1117; border: 1px solid var(--border);
            padding: 12px 16px; border-radius: 24px; color: white; outline: none; font-size: 15px;
        }
        input:focus { border-color: var(--accent); }

        /* MOBILE ADJUSTMENTS (Hot 10s) */
        @media (max-width: 600px) {
            .bubble { max-width: 90%; font-size: 14px; }
            pre { padding: 12px; }
            code { font-size: 12px; }
            .header-title { font-size: 14px; }
            .input-area { padding: 10px; }
        }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleSidebar()"></div>

<div id="login-page">
    <div class="logo-box">
        <img src="https://i.postimg.cc/4xr9PgN1/file-00000000aa9471fabbcb615488cb4b8a.png" alt="RHF Logo">
    </div>
    <button class="btn-google" id="loginBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
        RHF OMNI-CORE ACCESS
    </button>
</div>

<div id="sidebar">
    <div class="sidebar-header">
        <span style="font-weight:bold; color:var(--accent);">Chats History</span>
        <button class="menu-btn" onclick="toggleSidebar()" style="font-size:18px;">✕</button>
    </div>
    <div class="chat-list" id="sessionList">
        <div class="chat-item active">Current Core Session</div>
    </div>
</div>

<div id="main-system">
    <header>
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="header-title">OMNI-CORE v4.0 Pro</div>
        <img id="uImg" src="" style="width:32px; height:32px; border-radius:50%; border:2px solid var(--accent); cursor:pointer;" onclick="auth.signOut()">
    </header>

    <div id="chat-flow"></div>

    <div class="input-area">
        <label class="icon-btn" title="Add File Context">
            ➕ <input type="file" id="fileInput" hidden onchange="handleFile(this)">
        </label>
        
        <input type="text" id="msgInput" placeholder="Type prompt, code debug, or use Magic Wand..." autocomplete="off">
        
        <button class="icon-btn" id="imgModeBtn" title="Magic Wand: Generate Image" onclick="toggleImgMode()">✨</button>
        
        <button class="icon-btn" id="sendBtn" style="color:var(--accent); font-weight:bold; font-size:16px;">SEND</button>
    </div>
</div>

<script type="module">
    // Firebase & Libs
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

    // Konfigurasi RHF-CONFRIMS Kamu
    const firebaseConfig = {
        apiKey: "AIzaSyDNFXLa8WGAqhLnc8RrLLTgP3nLWvXkd1w",
        authDomain: "rhf-confrims.firebaseapp.com",
        projectId: "rhf-confrims",
        storageBucket: "rhf-confrims.firebasestorage.app",
        messagingSenderId: "631231605918",
        appId: "1:631231605918:web:d42d4e34e9ea14b2d65f8f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let isImageMode = false;
    let contextFile = "";

    // -- UI LOGIC --
    window.toggleSidebar = () => {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
    }

    window.toggleImgMode = () => {
        isImageMode = !isImageMode;
        const btn = document.getElementById('imgModeBtn');
        const input = document.getElementById('msgInput');
        if(isImageMode) {
            btn.classList.add('active');
            input.placeholder = "Describe the image you want to create...";
        } else {
            btn.classList.remove('active');
            input.placeholder = "Type prompt, code debug, or use Magic Wand...";
        }
    }

    // -- AUTH & DATABASE --
    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-system').style.display = 'flex';
            document.getElementById('uImg').src = user.photoURL;
            loadCoreMemory(user.uid);
        }
    });

    function loadCoreMemory(uid) {
        const q = query(collection(db, "chats"), where("uid", "==", uid), orderBy("time", "asc"));
        onSnapshot(q, (snap) => {
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                renderUI(d.sender, d.msg);
            });
        });
    }

    // -- FILE HANDLING (Target 4) --
    window.handleFile = (input) => {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                contextFile = `[FILE CONTEXT: ${file.name}]\n${e.target.result}\n[END FILE]`; 
                renderUI('user', `➕ Uploaded File: ${file.name}`);
            };
            reader.readAsText(file);
        }
    }

    // -- SEND ENGINE --
    async function sendCore() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text && !contextFile) return;

        input.value = '';
        const finalPrompt = contextFile ? `${contextFile}\n\n${text}` : text;
        const currentMode = isImageMode;
        if(currentMode) toggleImgMode(); // Reset mode after sending

        // Simpan User Msg
        await addDoc(collection(db, "chats"), {
            uid: auth.currentUser.uid,
            sender: 'user',
            msg: text || "Uploaded a file.",
            time: serverTimestamp()
        });

        contextFile = ""; // Clear context

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ pesan: finalPrompt, isImage: currentMode })
            });
            const data = await res.json();
            
            const replyMsg = data.type === 'image' ? `![generated](${data.reply})` : data.reply;
            
            await addDoc(collection(db, "chats"), {
                uid: auth.currentUser.uid,
                sender: 'ai',
                msg: replyMsg,
                time: serverTimestamp()
            });

        } catch (e) { console.error(e); }
    }

    document.getElementById('sendBtn').onclick = sendCore;
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendCore(); };

    // -- RENDER UI & COPY SYSTEM --
    function renderUI(sender, content) {
        const flow = document.getElementById('chat-flow');
        const div = document.createElement('div');
        div.className = `bubble ${sender}`;
        
        if(sender === 'ai') {
            // Render Markdown
            div.innerHTML = marked.parse(content);
            // Setup Code Blocks & Copy Buttons
            div.querySelectorAll('pre').forEach((pre, index) => {
                const container = document.createElement('div');
                container.className = 'code-container';
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = 'Copy Code';
                
                // Wrap pre in container
                pre.parentNode.insertBefore(container, pre);
                container.appendChild(pre);
                container.appendChild(copyBtn);

                const code = pre.querySelector('code');
                hljs.highlightElement(code);

                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(code.textContent).then(() => {
                        copyBtn.textContent = 'Copied!';
                        copyBtn.style.background = '#238636';
                        setTimeout(() => {
                            copyBtn.textContent = 'Copy Code';
                            copyBtn.style.background = 'rgba(255,255,255,0.1)';
                        }, 2000);
                    });
                };
            });
        } else {
            div.textContent = content;
        }
        
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }
</script>
</body>
</html>

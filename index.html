<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RHF OMNI-CORE PRO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --chat-bg: #161b22;
            --sidebar-bg: #010409;
            --accent: #58a6ff;
            --border: #30363d;
            --text: #e6edf3;
            --user-msg: #238636;
            --ai-msg: #21262d;
            --input-h: 70px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- LOGIN --- */
        #login-page {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000;
        }
        .btn-google {
            background: white; color: black; border: none; padding: 15px 30px; 
            border-radius: 8px; font-weight: 700; cursor: pointer;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            height: 100%; position: fixed; left: -260px; z-index: 4000; transition: 0.3s;
        }
        #sidebar.open { left: 0; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3500; }
        #overlay.open { display: block; }

        /* --- MAIN INTERFACE --- */
        #main-system { 
            display: none; /* Akan diubah ke flex via JS */
            flex-direction: column; 
            height: 100vh; 
            width: 100%;
            position: relative;
        }

        header {
            height: 60px; min-height: 60px; padding: 0 15px; background: var(--chat-bg); 
            border-bottom: 1px solid var(--border); display: flex; align-items: center;
        }
        .header-title { font-weight: 700; font-size: 14px; flex: 1; text-align: center; color: var(--accent); letter-spacing: 1.5px; }

        /* AREA CHAT */
        #chat-flow {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px;
            padding-bottom: 100px; /* Jarak agar tidak tertutup input */
        }

        .bubble { 
            max-width: 85%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; 
            word-wrap: break-word; position: relative;
        }
        .user { align-self: flex-end; background: var(--user-msg); border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--ai-msg); border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        /* KOTAK KODE */
        .code-container { position: relative; margin: 10px 0; border: 1px solid var(--accent); border-radius: 8px; overflow: hidden; }
        pre { background: #000 !important; padding: 15px; margin: 0; overflow-x: auto; }
        .copy-btn {
            position: absolute; top: 5px; right: 5px; background: #30363d; color: #8b949e;
            padding: 4px 8px; border-radius: 4px; font-size: 10px; border: none; cursor: pointer;
        }

        /* --- AREA INPUT (YANG TADI HILANG) --- */
        .input-wrapper {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--bg); border-top: 1px solid var(--border);
            padding: 15px; display: flex; align-items: center; gap: 10px;
            z-index: 3000;
        }

        .btn-tool { background: none; border: none; color: #8b949e; font-size: 20px; cursor: pointer; padding: 0 5px; }
        
        #msgInput {
            flex: 1; background: #0d1117; border: 1px solid var(--border);
            padding: 12px 15px; border-radius: 8px; color: white; outline: none; font-size: 14px;
        }

        .btn-img-toggle {
            background: none; border: 1px solid var(--border); color: #8b949e;
            font-size: 10px; font-weight: 800; padding: 5px 8px; border-radius: 4px; cursor: pointer;
        }
        .btn-img-toggle.active { color: var(--accent); border-color: var(--accent); }

        .btn-send-core {
            background: none; border: none; color: var(--accent);
            font-weight: 800; font-size: 14px; cursor: pointer;
        }

        @media (max-width: 600px) {
            .bubble { max-width: 90%; }
            .input-wrapper { padding: 12px; }
        }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleSidebar()"></div>

<div id="login-page">
    <img src="https://i.postimg.cc/4xr9PgN1/file-00000000aa9471fabbcb615488cb4b8a.png" style="width:100px; margin-bottom:20px;">
    <button class="btn-google" id="loginBtn">LOG IN SYSTEM</button>
</div>

<div id="sidebar">
    <div style="padding:20px; border-bottom:1px solid var(--border); font-weight:800; color:var(--accent);">HISTORY</div>
    <div id="sessionList" style="padding:15px; font-size:12px;">Memory core active...</div>
</div>

<div id="main-system">
    <header>
        <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:20px;">|||</button>
        <div class="header-title">RHF OMNI-CORE V4.2</div>
        <img id="uImg" src="" style="width:30px; border-radius:50%; border:1px solid var(--accent);" onclick="auth.signOut()">
    </header>

    <div id="chat-flow"></div>

    <div class="input-wrapper">
        <label class="btn-tool">
            + <input type="file" id="fileInput" hidden onchange="handleFile(this)">
        </label>
        
        <input type="text" id="msgInput" placeholder="Ketik perintah..." autocomplete="off">
        
        <button class="btn-img-toggle" id="imgModeBtn" onclick="toggleImgMode()">IMG</button>
        <button class="btn-send-core" id="sendBtn">SEND</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDNFXLa8WGAqhLnc8RrLLTgP3nLWvXkd1w",
        authDomain: "rhf-confrims.firebaseapp.com",
        projectId: "rhf-confrims",
        storageBucket: "rhf-confrims.firebasestorage.app",
        messagingSenderId: "631231605918",
        appId: "1:631231605918:web:d42d4e34e9ea14b2d65f8f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let isImageMode = false;
    let fileCtx = "";

    window.toggleSidebar = () => {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
    };

    window.toggleImgMode = () => {
        isImageMode = !isImageMode;
        document.getElementById('imgModeBtn').classList.toggle('active');
    };

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-system').style.display = 'flex';
            document.getElementById('uImg').src = user.photoURL;
            loadCore(user.uid);
        }
    });

    function loadCore(uid) {
        const q = query(collection(db, "chats"), where("uid", "==", uid), orderBy("time", "asc"));
        onSnapshot(q, (snap) => {
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = '';
            snap.forEach(doc => renderMessage(doc.data().sender, doc.data().msg));
        });
    }

    window.handleFile = (input) => {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                fileCtx = `[FILE: ${file.name}]\n${e.target.result}\n[END]`; 
                renderMessage('user', `Sistem menerima file: ${file.name}`);
            };
            reader.readAsText(file);
        }
    };

    async function processSend() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text && !fileCtx) return;

        input.value = '';
        const prompt = fileCtx ? `${fileCtx}\n${text}` : text;
        const mode = isImageMode;
        if(mode) toggleImgMode();

        await addDoc(collection(db, "chats"), {
            uid: auth.currentUser.uid,
            sender: 'user',
            msg: text || "Upload File",
            time: serverTimestamp()
        });

        fileCtx = "";

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ pesan: prompt, isImage: mode })
            });
            const data = await res.json();
            const out = data.type === 'image' ? `![img](${data.reply})` : data.reply;
            
            await addDoc(collection(db, "chats"), {
                uid: auth.currentUser.uid,
                sender: 'ai',
                msg: out,
                time: serverTimestamp()
            });
        } catch (e) { console.error("Signal Lost"); }
    }

    document.getElementById('sendBtn').onclick = processSend;
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') processSend(); };

    function renderMessage(sender, content) {
        const flow = document.getElementById('chat-flow');
        const div = document.createElement('div');
        div.className = `bubble ${sender}`;
        
        if(sender === 'ai') {
            div.innerHTML = marked.parse(content);
            div.querySelectorAll('pre').forEach(pre => {
                const container = document.createElement('div');
                container.className = 'code-container';
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.textContent = 'COPY';
                pre.parentNode.insertBefore(container, pre);
                container.appendChild(pre);
                container.appendChild(btn);
                const code = pre.querySelector('code');
                if(code) hljs.highlightElement(code);
                btn.onclick = () => {
                    navigator.clipboard.writeText(code.textContent);
                    btn.textContent = 'DONE';
                    setTimeout(() => btn.textContent = 'COPY', 2000);
                };
            });
        } else {
            div.textContent = content;
        }
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }
</script>
</body>
</html>

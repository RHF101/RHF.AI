<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF-AI OMNI-CORE v2</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg: #0d1117;
            --chat-bg: #161b22;
            --accent: #58a6ff;
            --text: #e6edf3;
            --code-border: #30363d;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }

        /* --- LOGIN SCREEN --- */
        #login-page {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .logo-box img { 
            width: 140px; height: 140px; border-radius: 50%; 
            border: 4px solid var(--accent); margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
        }
        .btn-google {
            display: flex; align-items: center; gap: 10px; background: white; color: #000;
            border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-google:hover { background: #e1e1e1; }

        /* --- MAIN SYSTEM --- */
        #main-system { display: none; height: 100vh; flex-direction: column; }
        header { 
            padding: 10px 20px; background: var(--chat-bg); 
            border-bottom: 1px solid var(--code-border); 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .user-profile { display: flex; align-items: center; gap: 10px; }
        .user-profile img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent); }
        
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        /* GUARD CODE - PEMBATAS PEMROGRAMAN ANTI TEMBUS */
        pre {
            background: #000 !important; padding: 15px; border-radius: 10px;
            border: 2px solid var(--accent); overflow-x: auto; margin: 15px 0;
            display: block; max-width: 100%; position: relative;
        }
        code { font-family: 'Consolas', 'Fira Code', monospace; font-size: 0.9em; }

        .bubble { max-width: 80%; padding: 14px; border-radius: 15px; line-height: 1.6; }
        .user { align-self: flex-end; background: #238636; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--chat-bg); border: 1px solid var(--code-border); border-bottom-left-radius: 2px; }

        .input-box { padding: 20px; background: var(--chat-bg); display: flex; gap: 10px; border-top: 1px solid var(--code-border); }
        input { flex: 1; background: #0d1117; border: 1px solid var(--code-border); padding: 12px; border-radius: 8px; color: white; outline: none; }
        input:focus { border-color: var(--accent); }
    </style>
</head>
<body>

<div id="login-page">
    <div class="logo-box">
        <img src="https://i.postimg.cc/4xr9PgN1/file-00000000aa9471fabbcb615488cb4b8a.png" alt="RHF Logo">
    </div>
    <div class="login-container">
        <button class="btn-google" id="loginBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Login to RHF Omni-Core
        </button>
    </div>
</div>

            <button id="logoutBtn" style="background:#da3633; border:none; color:white; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:12px;">Exit</button>
        </div>
    </header>
    <div id="chat-flow"></div>
    <div class="input-box">
        <input type="text" id="msgInput" placeholder="Command or /img..." autocomplete="off">
        <button id="sendBtn" style="background:var(--accent); border:none; color:white; padding:0 20px; border-radius:8px; cursor:pointer; font-weight:bold;">SEND</button>
    </div>
</div>

<script type="module">
    // Import SDK Modular
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

    // Konfigurasi RHF-CONFRIMS Kamu
    const firebaseConfig = {
        apiKey: "AIzaSyDNFXLa8WGAqhLnc8RrLLTgP3nLWvXkd1w",
        authDomain: "rhf-confrims.firebaseapp.com",
        databaseURL: "https://rhf-confrims-default-rtdb.firebaseio.com",
        projectId: "rhf-confrims",
        storageBucket: "rhf-confrims.firebasestorage.app",
        messagingSenderId: "631231605918",
        appId: "1:631231605918:web:d42d4e34e9ea14b2d65f8f",
        measurementId: "G-XRKGWWX0ZP"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // Elements
    const loginPage = document.getElementById('login-page');
    const mainSystem = document.getElementById('main-system');
    const msgInput = document.getElementById('msgInput');
    const flow = document.getElementById('chat-flow');

    // Auth Logic
    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, (user) => {
        if (user) {
            loginPage.style.display = 'none';
            mainSystem.style.display = 'flex';
            document.getElementById('uName').textContent = user.displayName.split(' ')[0];
            if(user.photoURL) document.getElementById('uImg').src = user.photoURL;
            loadIngatan(user.uid);
        }
    });

    // Ingatan Luas (Firestore Load)
    function loadIngatan(uid) {
        const q = query(collection(db, "chats"), where("uid", "==", uid), orderBy("time", "asc"));
        onSnapshot(q, (snap) => {
            flow.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                appendUI(d.sender, d.msg);
            });
        });
    }

    // Simpan ke Firestore
    async function simpan(sender, message) {
        await addDoc(collection(db, "chats"), {
            uid: auth.currentUser.uid,
            sender: sender,
            msg: message,
            time: serverTimestamp()
        });
    }

    // Send Engine
    window.processSend = async () => {
        const text = msgInput.value.trim();
        if(!text) return;
        
        msgInput.value = '';
        await simpan('user', text);

        const isImg = text.startsWith('/img ');
        const prompt = isImg ? text.replace('/img ', '') : text;

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ pesan: prompt, isImage: isImg })
            });
            const data = await res.json();
            
            if(data.type === 'image') {
                await simpan('ai', `![Generated Image](${data.reply})`);
            } else {
                await simpan('ai', data.reply);
            }
        } catch (e) {
            appendUI('ai', '⚠️ Error transmisi data ke Groq.');
        }
    };

    document.getElementById('sendBtn').onclick = window.processSend;
    msgInput.onkeypress = (e) => { if(e.key === 'Enter') window.processSend(); };

    function appendUI(sender, content) {
        const div = document.createElement('div');
        div.className = `bubble ${sender}`;
        
        if(sender === 'ai') {
            div.innerHTML = marked.parse(content);
            div.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
        } else {
            div.textContent = content;
        }
        
        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF-AI Omni-Core v2</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0d1117;
            --chat-bg: #161b22;
            --user-bubble: #238636;
            --ai-bubble: #21262d;
            --text-color: #e6edf3;
            --accent: #58a6ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header Area */
        header {
            padding: 15px;
            background: var(--chat-bg);
            text-align: center;
            border-bottom: 1px solid #30363d;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--accent);
        }

        /* Chat Container */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-bubble);
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            align-self: flex-start;
            background-color: var(--ai-bubble);
            border-bottom-left-radius: 2px;
            border: 1px solid #30363d;
        }

        /* Styling Kode di dalam Chat */
        pre {
            background: #000 !important;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
        }

        code {
            font-family: 'Consolas', monospace;
            font-size: 0.9em;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: var(--chat-bg);
            display: flex;
            gap: 10px;
            border-top: 1px solid #30363d;
        }

        input[type="text"] {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            padding: 12px;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.8;
        }

        /* Loading Animation */
        .typing {
            font-style: italic;
            font-size: 0.8em;
            color: #8b949e;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>

<header>RHF-AI OMNI-CORE v2</header>

<div id="chat-container">
    <div class="message ai-message">Halo Radit! RHF-AI Omni-Core v2 aktif. Apa yang mau kita modding hari ini?</div>
</div>

<div id="loading-status" class="typing" style="padding-left: 20px;">RHF-AI sedang berpikir...</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Ketik pesan atau perintah sistem..." onkeypress="handleKeyPress(event)">
    <button onclick="sendMessage()">KIRIM</button>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const loadingStatus = document.getElementById('loading-status');

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        
        if (!text) return;

        // Tampilkan pesan User
        appendMessage('user', text);
        input.value = '';
        
        // Munculkan loading
        loadingStatus.style.display = 'block';
        scrollToBottom();

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pesan: text })
            });

            const data = await response.json();
            
            // Sembunyikan loading dan tampilkan balasan AI
            loadingStatus.style.display = 'none';
            appendMessage('ai', data.reply);
            
        } catch (error) {
            loadingStatus.style.display = 'none';
            appendMessage('ai', '🚀 **CRASH:** Koneksi terputus. Cek Vercel Logs.');
        }
    }

    function appendMessage(sender, content) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}-message`;
        
        if (sender === 'ai') {
            // Render Markdown dan Highlight Code
            msgDiv.innerHTML = marked.parse(content);
            msgDiv.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
        } else {
            msgDiv.textContent = content;
        }

        chatContainer.appendChild(msgDiv);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RHF OMNI-CORE PRO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --bg: #0d1117; --chat-bg: #161b22; --accent: #58a6ff;
            --border: #30363d; --text: #e6edf3;
            --user-msg: #238636; --ai-msg: #21262d;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        #login-page {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }

        #main-system { display: none; flex-direction: column; height: 100vh; width: 100%; position: relative; }

        header { height: 60px; padding: 0 15px; background: var(--chat-bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }

        #chat-flow {
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px;
            padding-bottom: 90px; /* Ruang untuk input */
            background: var(--bg);
        }

        .bubble { 
            max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 14px; 
            line-height: 1.5; word-wrap: break-word; color: white;
        }
        .user { align-self: flex-end; background: var(--user-msg); border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--ai-msg); border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        .input-box {
            position: fixed; bottom: 0; width: 100%; background: var(--chat-bg);
            padding: 12px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px;
        }

        #msgInput {
            flex: 1; background: #0d1117; border: 1px solid var(--border);
            padding: 10px 15px; border-radius: 6px; color: white; outline: none;
        }

        .btn-send { color: var(--accent); font-weight: bold; background: none; border: none; cursor: pointer; padding: 5px 10px; }

        .code-container { position: relative; margin: 10px 0; border: 1px solid var(--accent); border-radius: 8px; overflow: hidden; }
        pre { background: #000 !important; padding: 15px; margin: 0; overflow-x: auto; }
        .copy-btn { position: absolute; top: 5px; right: 5px; background: #30363d; color: #fff; font-size: 10px; border: none; padding: 4px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-page">
    <button onclick="login()" style="padding:15px 30px; border-radius:8px; font-weight:bold; cursor:pointer;">LOGIN WITH GOOGLE</button>
</div>

<div id="main-system">
    <header>
        <span style="font-weight:bold; color:var(--accent);">RHF OMNI-CORE V4.3</span>
        <button onclick="auth.signOut()" style="background:none; border:none; color:red; font-size:12px;">LOGOUT</button>
    </header>

    <div id="chat-flow"></div>

    <div class="input-box">
        <input type="text" id="msgInput" placeholder="Ketik perintah..." autocomplete="off">
        <button class="btn-send" id="sendBtn">KIRIM</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDNFXLa8WGAqhLnc8RrLLTgP3nLWvXkd1w",
        authDomain: "rhf-confrims.firebaseapp.com",
        projectId: "rhf-confrims",
        storageBucket: "rhf-confrims.firebasestorage.app",
        messagingSenderId: "631231605918",
        appId: "1:631231605918:web:d42d4e34e9ea14b2d65f8f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    window.login = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-system').style.display = 'flex';
            loadData(user.uid);
        } else {
            document.getElementById('login-page').style.display = 'flex';
            document.getElementById('main-system').style.display = 'none';
        }
    });

    function loadData(uid) {
        const q = query(collection(db, "chats"), where("uid", "==", uid), orderBy("time", "asc"));
        onSnapshot(q, (snap) => {
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = ''; 
            snap.forEach(doc => {
                const data = doc.data();
                render(data.sender, data.msg);
            });
            flow.scrollTop = flow.scrollHeight;
        });
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text) return;

        input.value = '';
        
        // Simpan User Msg
        try {
            await addDoc(collection(db, "chats"), {
                uid: auth.currentUser.uid,
                sender: 'user',
                msg: text,
                time: serverTimestamp()
            });

            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ pesan: text })
            });
            const data = await res.json();

            await addDoc(collection(db, "chats"), {
                uid: auth.currentUser.uid,
                sender: 'ai',
                msg: data.reply,
                time: serverTimestamp()
            });
        } catch (e) { console.error("Error:", e); }
    }

    document.getElementById('sendBtn').onclick = sendMsg;
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };

    function render(sender, msg) {
        const flow = document.getElementById('chat-flow');
        const div = document.createElement('div');
        div.className = `bubble ${sender}`;

        if(sender === 'ai') {
            // Cek apakah library marked aman
            try {
                div.innerHTML = marked.parse(msg);
            } catch(e) {
                div.textContent = msg; // Fallback jika marked error
            }
            
            // Highlight Kode
            div.querySelectorAll('pre').forEach(pre => {
                const container = document.createElement('div');
                container.className = 'code-container';
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.textContent = 'SALIN';
                pre.parentNode.insertBefore(container, pre);
                container.appendChild(pre);
                container.appendChild(btn);
                
                const code = pre.querySelector('code');
                if(code) hljs.highlightElement(code);
                
                btn.onclick = () => {
                    navigator.clipboard.writeText(code.textContent);
                    btn.textContent = 'BERHASIL';
                    setTimeout(() => btn.textContent = 'SALIN', 2000);
                };
            });
        } else {
            div.textContent = msg;
        }

        flow.appendChild(div);
        flow.scrollTop = flow.scrollHeight;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RHF-AI | Omni-Core v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #3b82f6; --bg: #000000; --glass: rgba(10, 10, 10, 0.8); }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 280px; z-index: 100; transform: translateX(-100%); position: fixed; inset-y: 0; left: 0; background: #050505; border-right: 1px solid rgba(255,255,255,0.05); }
        .sidebar.open { transform: translateX(0); }
        #chat-container::-webkit-scrollbar { width: 0px; }
        .message-in { animation: fadeInUp 0.4s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Perbaikan Blok Kode */
        .code-wrapper { position: relative; margin: 15px 0; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .code-header { background: #2d2d2d; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 10px; font-family: 'JetBrains Mono'; color: #aaa; }
        .code-block { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: #1e1e1e; padding: 15px; display: block; overflow-x: auto; color: #7ee787; line-height: 1.6; white-space: pre; }
        .copy-btn { background: #3b82f6; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        #overlay { background: rgba(0,0,0,0.7); display: none; position: fixed; inset: 0; z-index: 90; }
        .typing::after { content: '|'; animation: blink 0.7s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .file-indicator { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); padding: 4px 10px; border-radius: 8px; font-size: 10px; color: #60a5fa; display: none; margin-bottom: 8px; }
        .ai-text { white-space: pre-wrap; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-black z-[200] flex items-center justify-center p-6 text-center">
        <div class="max-w-xs w-full">
            <img src="https://i.postimg.cc/4xr9PgN1/file-00000000aa9471fabbcb615488cb4b8a.png" class="w-24 h-24 mx-auto rounded-3xl mb-6 border border-white/10 shadow-2xl">
            <h1 class="text-3xl font-black text-white mb-2 italic tracking-tighter">RHF-AI v2</h1>
            <p class="text-[8px] text-slate-500 uppercase tracking-[0.5em] mb-10">Neural Interface Optimized</p>
            <button onclick="loginGoogle()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 active:scale-95 transition-all shadow-lg shadow-blue-600/20">
                <i class="fab fa-google text-lg"></i> AUTHENTICATE
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden flex h-screen w-full relative">
        <div id="sidebar" class="sidebar flex flex-col">
            <div class="p-6 flex justify-between items-center border-b border-white/5">
                <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest italic">Data Archive</span>
                <button onclick="toggleSidebar()"><i class="fas fa-times text-slate-500"></i></button>
            </div>
            <div id="chat-list" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
            <div class="p-6 border-t border-white/5">
                <button onclick="logout()" class="w-full py-3 text-[10px] font-bold text-red-500 border border-red-500/10 rounded-xl uppercase">Terminate Session</button>
            </div>
        </div>

        <div id="overlay" onclick="toggleSidebar()"></div>

        <div class="flex-1 flex flex-col min-w-0 bg-black">
            <header class="h-16 flex items-center px-4 justify-between glass sticky top-0 z-10">
                <button onclick="toggleSidebar()" class="w-10 h-10 text-slate-300"><i class="fas fa-bars-staggered"></i></button>
                <div class="text-center">
                    <span class="text-[10px] font-black tracking-[0.4em] text-white uppercase italic">Omni-Core v2</span>
                </div>
                <button onclick="newChat()" class="w-10 h-10 text-blue-500"><i class="fas fa-plus-circle text-xl"></i></button>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-4 lg:px-20 lg:py-10 space-y-6 scroll-smooth"></div>

            <div class="p-4 bg-gradient-to-t from-black via-black to-transparent">
                <div class="max-w-4xl mx-auto flex flex-col bg-[#0a0a0a] border border-white/5 rounded-[2rem] p-2 shadow-2xl">
                    <div id="file-preview" class="file-indicator mx-2 mt-2">
                        <i class="fas fa-file-alt mr-2"></i> <span id="file-name"></span>
                        <button onclick="clearFile()" class="ml-2 text-red-500"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="flex items-end gap-2">
                        <input type="file" id="file-input" class="hidden" onchange="handleFileUpload(this)">
                        <button onclick="document.getElementById('file-input').click()" class="w-12 h-12 rounded-full text-slate-400 hover:bg-white/5 transition-colors"><i class="fas fa-paperclip"></i></button>
                        <textarea id="user-input" rows="1" placeholder="Type a command..." class="flex-1 bg-transparent p-3 outline-none text-sm text-slate-200 resize-none" oninput="autoResize(this)"></textarea>
                        <div class="flex gap-1 p-1">
                            <button onclick="processAI(true)" title="Generate Image" class="w-12 h-12 rounded-full text-blue-400 hover:bg-blue-500/10 transition-colors"><i class="fas fa-wand-magic-sparkles"></i></button>
                            <button onclick="processAI(false)" id="btn-send" class="w-12 h-12 rounded-full bg-blue-600 text-white shadow-lg active:scale-90 transition-all flex items-center justify-center">
                                <i class="fas fa-paper-plane text-xs"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <p class="text-center text-[8px] text-slate-600 mt-3 tracking-widest uppercase">System Architect: Radit Tiya</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNFXLa8WGAqhLnc8RrLLTgP3nLWvXkd1w",
            authDomain: "rhf-confrims.firebaseapp.com",
            projectId: "rhf-confrims",
            storageBucket: "rhf-confrims.firebasestorage.app",
            messagingSenderId: "631231605918",
            appId: "1:631231605918:web:d42d4e34e9ea14b2d65f8f"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let historyChat = [];
        let currentChatId = null;
        let attachedFileContent = "";

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
        }

        function handleFileUpload(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                attachedFileContent = e.target.result;
                document.getElementById('file-name').innerText = file.name;
                document.getElementById('file-preview').style.display = 'block';
            };
            reader.readAsText(file);
        }

        function clearFile() {
            attachedFileContent = "";
            document.getElementById('file-input').value = "";
            document.getElementById('file-preview').style.display = 'none';
        }

        function loginGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                loadChatList();
            }
        });
        function logout() { auth.signOut().then(() => location.reload()); }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            sb.classList.toggle('open');
            ov.style.display = sb.classList.contains('open') ? 'block' : 'none';
        }

        async function processAI(isImageMode) {
            const input = document.getElementById('user-input');
            const pesan = input.value.trim();
            if (!pesan && !attachedFileContent) return;

            appendMessage('user', pesan + (attachedFileContent ? "\n[File attached]" : ""));
            const currentFile = attachedFileContent;
            input.value = '';
            input.style.height = 'auto';
            clearFile();

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        pesan: pesan, 
                        isImage: isImageMode, 
                        history: historyChat,
                        fileContent: currentFile
                    })
                });

                const data = await response.json();
                if (data.type === "image") {
                    appendImage(data.reply);
                    saveToFirestore(pesan, data.reply);
                } else {
                    renderAIResponse(data.reply);
                    saveToFirestore(pesan, data.reply);
                }
            } catch (err) {
                appendMessage('ai', "SYSTEM CRASH: Neural link failed.");
            }
        }

        function appendMessage(sender, text) {
            const container = document.getElementById('chat-container');
            const wrap = document.createElement('div');
            wrap.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} message-in mb-4`;
            
            const inner = document.createElement('div');
            inner.className = sender === 'user' 
                ? "bg-blue-600 text-white px-5 py-3 rounded-2xl rounded-tr-none text-[13px] max-w-[85%] shadow-xl" 
                : "bg-[#0a0a0a] border border-white/10 text-slate-300 px-5 py-4 rounded-2xl rounded-tl-none text-[13px] max-w-[90%] ai-text";
            
            inner.innerText = text;
            wrap.appendChild(inner);
            container.appendChild(wrap);
            container.scrollTop = container.scrollHeight;
            
            if (sender === 'user') historyChat.push({ role: 'user', content: text });
        }

        function renderAIResponse(text) {
            const container = document.getElementById('chat-container');
            const wrap = document.createElement('div');
            wrap.className = "flex justify-start message-in mb-4";
            
            const inner = document.createElement('div');
            inner.className = "w-full max-w-[95%] text-slate-300 text-[13px] ai-text typing";
            wrap.appendChild(inner);
            container.appendChild(wrap);

            const parts = text.split(/```/);
            let partIdx = 0;

            function processParts() {
                if (partIdx < parts.length) {
                    const content = parts[partIdx];
                    if (partIdx % 2 === 1) { // Ini adalah bagian kode
                        const codeContent = content.trim();
                        const codeId = "code-" + Date.now();
                        inner.innerHTML += `
                            <div class="code-wrapper">
                                <div class="code-header">
                                    <span>SOURCE CODE</span>
                                    <span class="copy-btn" onclick="copyCode('${codeId}')">COPY</span>
                                </div>
                                <pre id="${codeId}" class="code-block">${codeContent}</pre>
                            </div>`;
                    } else { // Ini teks biasa
                        inner.innerHTML += `<span>${content}</span>`;
                    }
                    partIdx++;
                    container.scrollTop = container.scrollHeight;
                    processParts();
                } else {
                    inner.classList.remove('typing');
                }
            }
            processParts();
            historyChat.push({ role: 'assistant', content: text });
        }

        function copyCode(id) {
            const code = document.getElementById(id).innerText;
            navigator.clipboard.writeText(code);
            alert("Code Copied!");
        }

        function appendImage(url) {
            const container = document.getElementById('chat-container');
            const wrap = document.createElement('div');
            wrap.className = "flex justify-start message-in mb-4";
            wrap.innerHTML = `<div class="bg-[#0a0a0a] p-2 rounded-2xl border border-white/10 max-w-[280px]">
                <img src="${url}" class="rounded-xl w-full shadow-2xl">
            </div>`;
            container.appendChild(wrap);
            container.scrollTop = container.scrollHeight;
        }

        async function saveToFirestore(u, a) {
            if (!auth.currentUser) return;
            const uid = auth.currentUser.uid;
            if (!currentChatId) {
                currentChatId = "session_" + Date.now();
                await db.collection('chats').doc(uid).collection('sessions').doc(currentChatId).set({
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
                    title: u.substring(0, 35)
                });
            }
            await db.collection('chats').doc(uid).collection('sessions').doc(currentChatId).collection('messages').add({
                user: u, ai: a, time: firebase.firestore.FieldValue.serverTimestamp()
            });
            await db.collection('chats').doc(uid).collection('sessions').doc(currentChatId).update({ lastUpdated: firebase.firestore.FieldValue.serverTimestamp() });
            loadChatList();
        }

        async function loadChatList() {
            if (!auth.currentUser) return;
            const list = document.getElementById('chat-list');
            const snapshot = await db.collection('chats').doc(auth.currentUser.uid).collection('sessions').orderBy('lastUpdated', 'desc').get();
            list.innerHTML = '';
            snapshot.forEach(doc => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 hover:bg-white/5 rounded-2xl text-[11px] text-slate-400 truncate mb-1 border border-transparent hover:border-white/10 flex items-center gap-3";
                btn.innerHTML = `<i class="far fa-comment-alt opacity-30 text-[10px]"></i> <span>${doc.data().title || 'New Log'}</span>`;
                btn.onclick = () => loadMessages(doc.id);
                list.appendChild(btn);
            });
        }

        async function loadMessages(id) {
            currentChatId = id;
            const container = document.getElementById('chat-container');
            container.innerHTML = '';
            historyChat = [];
            if(window.innerWidth < 1024) toggleSidebar();
            const snapshot = await db.collection('chats').doc(auth.currentUser.uid).collection('sessions').doc(id).collection('messages').orderBy('time').get();
            snapshot.forEach(doc => {
                const data = doc.data();
                appendMessage('user', data.user);
                if (data.ai.includes('pollinations.ai') || data.ai.includes('http')) { 
                    appendImage(data.ai); 
                } else { 
                    renderAIResponse(data.ai); 
                }
            });
        }

        function newChat() {
            currentChatId = null;
            historyChat = [];
            document.getElementById('chat-container').innerHTML = '';
            if(window.innerWidth < 1024) toggleSidebar();
        }
    </script>
</body>
</html>

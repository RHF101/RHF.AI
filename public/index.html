<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ChatGPT</title>
    <style>
        body { background-color: #ffffff; color: #0d0d0d; font-family: -apple-system, Segoe UI, Roboto, sans-serif; }
        .user-row { background: #fff; padding: 24px; border-bottom: 1px solid #f0f0f0; }
        .ai-row { background: #f7f7f8; padding: 24px; border-bottom: 1px solid #f0f0f0; }
        .content { max-width: 48rem; margin: auto; line-height: 1.6; }
        pre { background: #000; color: #0f0; padding: 15px; border-radius: 8px; overflow-x: auto; margin: 10px 0; font-family: monospace; }
        #input-container { border: 1px solid #e5e5e5; border-radius: 24px; background: #fff; box-shadow: 0 0 15px rgba(0,0,0,0.05); }
        .typing::after { content: '|'; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="p-4 border-b text-center font-semibold text-gray-700">ChatGPT</header>

    <main id="chat-window" class="flex-1 overflow-y-auto"></main>

    <footer class="p-4 bg-white">
        <div id="input-container" class="max-w-3xl mx-auto flex items-center p-2">
            <textarea id="msg" rows="1" class="flex-1 bg-transparent outline-none p-3 resize-none" placeholder="Balasan untuk ChatGPT"></textarea>
            <button onclick="send()" class="bg-black text-white p-2 rounded-full ml-2 w-10 h-10 flex items-center justify-center">
                <svg width="16" height="16" fill="white" viewBox="0 0 16 16"><path d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.002.26.41a.5.5 0 0 0 .886-.083l6-15Zm-1.833 1.89L6.637 10.07l-.215-.338L2.961 6.596 14.131 2.576Z"/></svg>
            </button>
        </div>
        <p class="text-[10px] text-center text-gray-400 mt-2">Diciptakan oleh RHF. Versi Tanpa Batas.</p>
    </footer>

    <script>
        let db = JSON.parse(localStorage.getItem('rhf_nexus')) || [];
        const win = document.getElementById('chat-window');

        function typeWriter(element, text, i = 0) {
            if (i < text.length) {
                element.innerHTML = text.substring(0, i + 1).replace(/\n/g, '<br>').replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
                setTimeout(() => typeWriter(element, text, i + 1), 15);
                win.scrollTop = win.scrollHeight;
            } else {
                element.classList.remove('typing');
            }
        }

        function renderChat(isNew = false) {
            win.innerHTML = "";
            db.forEach((m, idx) => {
                const row = document.createElement('div');
                row.className = m.role === 'user' ? 'user-row' : 'ai-row';
                const contentDiv = document.createElement('div');
                contentDiv.className = "content";
                
                if (isNew && idx === db.length - 1 && m.role === 'assistant') {
                    contentDiv.classList.add('typing');
                    typeWriter(contentDiv, m.content);
                } else {
                    contentDiv.innerHTML = m.content.replace(/\n/g, '<br>').replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
                }
                
                row.appendChild(contentDiv);
                win.appendChild(row);
            });
            win.scrollTop = win.scrollHeight;
        }

        async function send() {
            const inp = document.getElementById('msg');
            const val = inp.value;
            if(!val) return;

            db.push({ role: "user", content: val });
            inp.value = "";
            renderChat();

            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ messages: db })
            });
            const data = await res.json();
            db.push(data.choices[0].message);
            localStorage.setItem('rhf_nexus', JSON.stringify(db));
            renderChat(true);
        }

        renderChat();
    </script>
</body>
</html>

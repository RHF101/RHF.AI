    <div id="main-app" class="hidden flex h-screen overflow-hidden">
        
        <div id="sidebar" class="fixed lg:relative inset-y-0 left-0 w-64 bg-slate-900 text-white z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
            <div class="p-4 h-full flex flex-col">
                <div class="flex items-center justify-between mb-6">
                    <span class="font-bold text-xl tracking-tight">RHF CHATS</span>
                    <button onclick="toggleSidebar()" class="lg:hidden"><i class="fas fa-times"></i></button>
                </div>
                <button onclick="newChat()" class="w-full bg-slate-800 hover:bg-slate-700 py-3 rounded-lg border border-slate-700 mb-6 transition-all">
                    <i class="fas fa-plus mr-2"></i> Chat Baru
                </button>
                <div id="chat-list" class="flex-1 overflow-y-auto space-y-2">
                    </div>
                <div class="pt-4 border-t border-slate-800 text-sm">
                    <p id="user-info" class="mb-2 truncate opacity-70"></p>
                    <button onclick="logout()" class="text-red-400 hover:text-red-300"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col bg-slate-50 relative">
            <header class="h-16 bg-white border-b border-slate-200 flex items-center px-4 justify-between shadow-sm">
                <button onclick="toggleSidebar()" class="p-2 text-slate-600 hover:bg-slate-100 rounded-lg">
                    <i class="fas fa-bars"></i>
                </button>
                <span class="font-semibold text-slate-700">RHF Luxury AI</span>
                <div class="w-8"></div>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 chat-container">
                </div>

            <div class="p-4 bg-white border-t border-slate-200">
                <div class="max-w-4xl mx-auto flex gap-2">
                    <input type="text" id="user-input" placeholder="Tanya sesuatu ke AI..." 
                           class="flex-1 bg-slate-100 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    <button onclick="sendMessage()" class="bg-blue-600 text-white w-12 h-12 rounded-xl flex items-center justify-center hover:bg-blue-700 shadow-md">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG (Ganti dengan config milikmu sendiri!)
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "rhf-wallet.firebaseapp.com",
            projectId: "rhf-wallet",
            storageBucket: "rhf-wallet.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let historyChat = [];
        let currentChatId = null;

        // AUTH LOGIC
        function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-info').innerText = user.email;
                loadChatList();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        function logout() {
            auth.signOut().then(() => location.reload());
        }

        // SIDEBAR & CHAT LOGIC
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }

        function newChat() {
            currentChatId = Date.now().toString();
            historyChat = [];
            document.getElementById('chat-container').innerHTML = '';
            toggleSidebar();
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const pesan = input.value.trim();
            if (!pesan) return;

            // Tampilkan pesan User (Abu-abu Luxury)
            appendMessage('user', pesan);
            input.value = '';

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        pesan: pesan,
                        history: historyChat,
                        email: auth.currentUser.email // Kirim email ke chat.js
                    })
                });

                const data = await response.json();
                appendMessage('ai', data.reply);
                
                // Simpan ke Firestore
                saveToFirestore(pesan, data.reply);
                
            } catch (error) {
                appendMessage('ai', "Gagal menghubungi server.");
            }
        }

        function appendMessage(sender, text) {
            const container = document.getElementById('chat-container');
            const wrapper = document.createElement('div');
            wrapper.className = sender === 'user' ? "flex justify-end" : "flex justify-start";

            const bubble = document.createElement('div');
            // Warna User: Abu-abu (bg-slate-200), Warna AI: Putih (bg-white)
            bubble.className = sender === 'user' 
                ? "bg-slate-200 text-slate-800 px-4 py-2 rounded-2xl rounded-tr-none max-w-[85%] shadow-sm"
                : "bg-white text-slate-700 border border-slate-200 px-4 py-2 rounded-2xl rounded-tl-none max-w-[85%] shadow-md";
            
            bubble.innerText = text;
            wrapper.appendChild(bubble);
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
            
            historyChat.push({ role: sender === 'user' ? 'user' : 'assistant', content: text });
        }

        async function saveToFirestore(uPesan, aPesan) {
            if (!currentChatId) currentChatId = Date.now().toString();
            const docRef = db.collection('chats').doc(auth.currentUser.uid).collection('sessions').doc(currentChatId);
            await docRef.set({
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
                title: uPesan.substring(0, 20) + "..."
            }, { merge: true });

            await docRef.collection('messages').add({
                user: uPesan,
                ai: aPesan,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            loadChatList();
        }

        async function loadChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            const snapshot = await db.collection('chats').doc(auth.currentUser.uid).collection('sessions').orderBy('lastUpdated', 'desc').get();
            snapshot.forEach(doc => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-2 hover:bg-slate-800 rounded transition-all text-sm truncate";
                btn.innerHTML = `<i class="far fa-comment-alt mr-2"></i> ${doc.data().title || 'Chat Tanpa Judul'}`;
                btn.onclick = () => loadMessages(doc.id);
                list.appendChild(btn);
            });
        }

        async function loadMessages(id) {
            currentChatId = id;
            document.getElementById('chat-container').innerHTML = '';
            historyChat = [];
            const snapshot = await db.collection('chats').doc(auth.currentUser.uid).collection('sessions').doc(id).collection('messages').orderBy('time').get();
            snapshot.forEach(doc => {
                appendMessage('user', doc.data().user);
                appendMessage('ai', doc.data().ai);
            });
            toggleSidebar();
        }
    </script>
</body>
</html>

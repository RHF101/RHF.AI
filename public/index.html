<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF NEXUS - CORE V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar-dark { background-color: #202123; }
        .ai-bubble { background-color: #f7f7f8; border: 1px solid #e5e5e5; }
        .user-bubble { background-color: #ffffff; border: 1px solid #e1e1e1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="sidebar-dark w-72 flex flex-col hidden md:flex h-full text-gray-200">
        <button onclick="window.location.reload()" class="m-3 p-3 border border-gray-600 rounded-lg hover:bg-gray-700 transition flex items-center gap-3 text-sm font-semibold">
            <i class="fa fa-plus"></i> New Chat
        </button>

        <div id="chat-history" class="flex-1 overflow-y-auto px-3 space-y-2 no-scrollbar">
            <p class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mt-4 mb-2 px-2">Riwayat Percakapan</p>
        </div>

        <div class="p-4 border-t border-gray-700">
            <div id="login-section">
                <button onclick="loginRHF()" class="w-full py-2 bg-white text-black rounded-lg font-bold text-sm flex items-center justify-center gap-2 hover:bg-gray-200 transition">
                    <i class="fab fa-google"></i> Login with Google
                </button>
            </div>
            <div id="profile-section" class="hidden flex items-center gap-3">
                <img id="user-avatar" class="w-10 h-10 rounded-full border-2 border-red-500">
                <div class="overflow-hidden">
                    <p id="user-name-display" class="text-sm font-bold truncate"></p>
                    <button onclick="logoutRHF()" class="text-[10px] text-red-400 hover:underline">Keluar</button>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN AREA -->
    <main class="flex-1 flex flex-col bg-white relative">
        <header class="h-16 border-b flex items-center justify-between px-6 bg-white/90 backdrop-blur-md sticky top-0 z-20">
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                <h1 class="font-bold text-slate-900 tracking-tighter">RHF-CORE <span class="text-gray-400 font-normal">V2</span></h1>
            </div>
            <div class="text-[10px] font-mono text-gray-400 bg-gray-100 px-2 py-1 rounded">RHF-SHOP-MAFIA-SYSTEM</div>
        </header>

        <div id="chat-display" class="flex-1 overflow-y-auto p-4 md:px-32 space-y-6 pt-10 pb-40 no-scrollbar">
            <div class="ai-bubble p-5 rounded-2xl max-w-3xl shadow-sm">
                <p class="text-[10px] font-black text-red-600 mb-2 uppercase tracking-tighter italic text-right">ROOT@RHF-CORE</p>
                <p id="status-text" class="text-sm text-slate-700 leading-relaxed">Sistem RHF-CORE aktif. Menunggu otentikasi...</p>
            </div>
        </div>

        <!-- INPUT -->
        <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-white via-white to-transparent">
            <div class="max-w-3xl mx-auto flex gap-2">
                <div class="relative flex-1">
                    <input type="text" id="user-input" 
                        class="w-full p-4 pr-12 rounded-2xl border border-gray-300 focus:outline-none focus:border-slate-500 shadow-xl text-sm" 
                        placeholder="Kirim perintah ke core...">
                    <button onclick="handleSend()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-800 hover:scale-110 transition">
                        <i class="fa fa-paper-plane-vertical"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- SCRIPT FIREBASE TERPADU -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCs7Vnysf25BwhN2-fPTODd48xwzbPkbzI",
            authDomain: "rhf-shop-mafia-8d2e5.firebaseapp.com",
            projectId: "rhf-shop-mafia-8d2e5",
            storageBucket: "rhf-shop-mafia-8d2e5.firebasestorage.app",
            messagingSenderId: "158711184948",
            appId: "1:158711184948:web:9223f07fa6658601189461"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Global functions
        window.loginRHF = () => signInWithPopup(auth, provider).catch(e => alert(e.message));
        window.logoutRHF = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const statusEl = document.getElementById('status-text');
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('profile-section').classList.remove('hidden');
                document.getElementById('user-avatar').src = user.photoURL;
                document.getElementById('user-name-display').innerText = user.displayName;
                statusEl.innerHTML = `Master <b>${user.displayName}</b> terdeteksi. Silahkan akses CORE.`;
                loadHistory(user.uid);
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('profile-section').classList.add('hidden');
                statusEl.innerText = "Sistem RHF-CORE aktif. Silahkan login untuk akses penuh.";
            }
        });

        window.handleSend = async () => {
            const input = document.getElementById('user-input');
            const msg = input.value;
            if(!msg) return;

            appendMessage('USER', msg);
            input.value = '';

            try {
                // GANTI DENGAN URL NGROK DARI COLAB SETIAP RESTART
                const response = await fetch("https://ALAMAT-NGROK-KAMU.ngrok-free.app/api/generate", {
                    method: 'POST',
                    body: JSON.stringify({ model: 'rhf-core', prompt: msg, stream: false })
                });
                const data = await response.json();
                appendMessage('CORE', data.response);

                if(auth.currentUser) {
                    await addDoc(collection(db, "chats"), {
                        uid: auth.currentUser.uid,
                        text: msg,
                        response: data.response,
                        time: Date.now()
                    });
                }
            } catch (e) {
                appendMessage('SYSTEM', 'Koneksi Colab Error. Cek Ngrok!');
            }
        };

        function appendMessage(role, txt) {
            const display = document.getElementById('chat-display');
            const div = document.createElement('div');
            div.className = role === 'CORE' ? 'ai-bubble p-5 rounded-2xl max-w-3xl shadow-sm' : 'user-bubble p-5 rounded-2xl max-w-3xl ml-auto shadow-sm border border-gray-200';
            div.innerHTML = `<p class="text-[9px] font-bold ${role === 'CORE' ? 'text-red-600' : 'text-slate-400'} mb-1 uppercase">${role}</p><p class="text-sm leading-relaxed">${txt}</p>`;
            display.appendChild(div);
            display.scrollTop = display.scrollHeight;
        }

        function loadHistory(uid) {
            const q = query(collection(db, "chats"), where("uid", "==", uid), orderBy("time", "desc"));
            onSnapshot(q, (snap) => {
                const hist = document.getElementById('chat-history');
                hist.innerHTML = '<p class="text-[10px] uppercase tracking-widest text-gray-500 font-bold mt-4 mb-2 px-2">Riwayat Percakapan</p>';
                snap.forEach(doc => {
                    const div = document.createElement('div');
                    div.className = "p-3 text-xs hover:bg-gray-800 rounded-lg cursor-pointer truncate text-gray-400 transition";
                    div.innerText = doc.data().text;
                    hist.appendChild(div);
                });
            });
        }
    <script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('-translate-x-full');
    }
 </script>
</body>
</html>

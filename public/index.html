<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RHF-AI | Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; overflow: hidden; font-family: sans-serif; }
        .sidebar { transition: transform 0.3s ease; width: 280px; }
        .sidebar.closed { transform: translateX(-100%); }
        .chat-container::-webkit-scrollbar { width: 0px; }
        .img-result { border-radius: 15px; margin-top: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="main-app" class="flex h-screen w-full relative">
        
        <div id="sidebar" class="sidebar fixed inset-y-0 left-0 bg-[#0a0a0a] border-r border-[#1a1a1a] z-50 p-5 flex flex-col closed">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-black text-xs tracking-[0.3em] text-blue-500">HISTORY</h2>
                <button onclick="toggleSidebar()"><i class="fas fa-times text-slate-500"></i></button>
            </div>
            <div id="chat-list" class="flex-1 overflow-y-auto space-y-2"></div>
            <div class="mt-auto pt-4 border-t border-[#1a1a1a]">
                <button onclick="logout()" class="text-[10px] font-bold text-red-500">SHUTDOWN</button>
            </div>
        </div>

        <div class="flex-1 flex flex-col min-w-0">
            <header class="h-14 border-b border-[#1a1a1a] flex items-center px-4 justify-between bg-black/50 backdrop-blur-md">
                <button onclick="toggleSidebar()" class="p-2"><i class="fas fa-bars-staggered"></i></button>
                <span class="text-[10px] font-black tracking-widest uppercase">RHF Neural Engine</span>
                <button onclick="newChat()" class="p-2 text-blue-500"><i class="fas fa-plus-circle"></i></button>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6"></div>

            <div class="p-4 bg-gradient-to-t from-black to-transparent">
                <div class="max-w-3xl mx-auto flex items-end gap-2 bg-[#111] border border-[#222] rounded-2xl p-2 focus-within:border-blue-900 transition-all">
                    <textarea id="user-input" rows="1" placeholder="Type or generate..." class="flex-1 bg-transparent border-none p-2 focus:ring-0 outline-none text-sm resize-none"></textarea>
                    
                    <button onclick="processAI(true)" id="btn-img" class="w-10 h-10 rounded-xl bg-[#1a1a1a] text-blue-400 hover:bg-blue-600 hover:text-white transition-all">
                        <i class="fas fa-magic"></i>
                    </button>
                    
                    <button onclick="processAI(false)" class="w-10 h-10 rounded-xl bg-blue-600 text-white flex items-center justify-center">
                        <i class="fas fa-paper-plane text-xs"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE (Tetap pakai punya kamu)
        const firebaseConfig = { /* ... data kamu ... */ };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let historyChat = [];
        let currentChatId = null;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('closed'); }

        async function processAI(isImage) {
            const input = document.getElementById('user-input');
            const pesan = input.value.trim();
            if (!pesan) return;

            appendMessage('user', pesan);
            input.value = '';
            
            const btnImg = document.getElementById('btn-img');
            if(isImage) btnImg.innerHTML = '<i class="fas fa-spinner animate-spin"></i>';

            try {
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ pesan, isImage, history: historyChat })
                });
                const data = await res.json();
                
                if (data.type === 'image') {
                    appendImage(data.reply);
                } else {
                    appendMessage('ai', data.reply);
                }
                saveToFirestore(pesan, data.reply);
            } catch (e) { appendMessage('ai', "Error connecting to Core."); }
            
            btnImg.innerHTML = '<i class="fas fa-magic"></i>';
        }

        function appendMessage(sender, text) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="p-3 rounded-2xl text-sm ${sender === 'user' ? 'bg-blue-600' : 'bg-[#1a1a1a] text-slate-300'} max-w-[85%]">${text}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            historyChat.push({ role: sender === 'user' ? 'user' : 'assistant', content: text });
        }

        function appendImage(url) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = "flex justify-start";
            div.innerHTML = `<img src="${url}" class="img-result w-full max-w-[300px]" alt="AI Visual">`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // ... Sisanya fungsi Load Chat & Logout tetap sama ...
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #212121; color: #d1d1d1; }
        pre { background-color: #000; padding: 10px; border-radius: 5px; overflow-x: auto; color: #00ffcc; font-family: monospace; border: 1px solid #333; margin: 10px 0; }
        code { font-family: monospace; color: #ff79c6; }
        .user-bubble { background-color: #343541; padding: 15px; border-bottom: 1px solid #2a2b32; }
        .ai-bubble { background-color: #212121; padding: 15px; border-bottom: 1px solid #2a2b32; }
        .sidebar { background-color: #171717; width: 260px; display: none; }
        @media (min-width: 768px) { .sidebar { display: flex; } }
    </style>
</head>
<body class="flex h-screen">

    <div class="sidebar flex-col p-3 border-r border-gray-800">
        <button onclick="newChat()" class="w-full border border-gray-600 p-2 rounded hover:bg-gray-800 text-sm mb-4">+ New Chat</button>
        <div id="history" class="flex-1 overflow-y-auto space-y-2 text-xs opacity-60"></div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <div id="chat-box" class="flex-1 overflow-y-auto">
            <!-- Pesan akan muncul di sini -->
        </div>

        <div class="p-4 bg-[#212121]">
            <div class="max-w-3xl mx-auto relative flex items-center bg-[#40414f] rounded-xl shadow-xl">
                <textarea id="msg-input" rows="1" class="w-full bg-transparent p-4 pr-12 outline-none resize-none" placeholder="Ketik kode atau pertanyaan..."></textarea>
                <button onclick="send()" class="absolute right-3 text-cyan-500 font-bold hover:scale-110 transition">↑</button>
            </div>
            <p class="text-[10px] text-center mt-2 opacity-30">RHF AI Unrestricted Version</p>
        </div>
    </div>

    <script>
        let currentId = Date.now();
        let sessions = JSON.parse(localStorage.getItem('rhf_v2')) || {};

        function save() {
            localStorage.setItem('rhf_v2', JSON.stringify(sessions));
            renderHistory();
        }

        function renderHistory() {
            const h = document.getElementById('history');
            h.innerHTML = "";
            Object.keys(sessions).reverse().forEach(id => {
                const d = document.createElement('div');
                d.className = "p-2 hover:bg-gray-800 rounded cursor-pointer truncate";
                d.innerText = sessions[id][0]?.content || "Chat Baru";
                d.onclick = () => { currentId = id; renderChat(); };
                h.appendChild(d);
            });
        }

        function renderChat() {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            (sessions[currentId] || []).forEach(m => {
                const wrap = document.createElement('div');
                wrap.className = m.role === 'user' ? 'user-bubble' : 'ai-bubble';
                // Render kode sederhana
                const content = m.content.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
                wrap.innerHTML = `<div class='max-w-3xl mx-auto'><b>${m.role==='user'?'YOU':'AI'}:</b><br>${content}</div>`;
                box.appendChild(wrap);
            });
            box.scrollTop = box.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if(!val) return;

            if(!sessions[currentId]) sessions[currentId] = [];
            sessions[currentId].push({ role: "user", content: val });
            input.value = "";
            renderChat();

            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: sessions[currentId] })
            });
            
            const data = await res.json();
            sessions[currentId].push(data.choices[0].message);
            save();
            renderChat();
        }

        function newChat() {
            currentId = Date.now();
            sessions[currentId] = [];
            renderChat();
            renderHistory();
        }

        renderHistory();
        renderChat();
    </script>
</body>
</html>

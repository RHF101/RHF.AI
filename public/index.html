<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF-AI | Neural Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #09090b; --card: #18181b; --green: #22c55e; --blue: #2563eb; --text: #f4f4f5; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; height: 100vh; }
        #app { width: 100%; max-width: 800px; display: flex; flex-direction: column; border-left: 1px solid #27272a; border-right: 1px solid #27272a; }
        header { padding: 15px; border-bottom: 1px solid #27272a; display: flex; justify-content: space-between; align-items: center; background: rgba(9,9,11,0.8); backdrop-filter: blur(10px); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 15px; line-height: 1.6; }
        .user { align-self: flex-end; background: var(--blue); border-radius: 15px 15px 0 15px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid #27272a; border-radius: 15px 15px 15px 0; }
        .input-area { padding: 20px; border-top: 1px solid #27272a; display: flex; gap: 10px; }
        input { flex: 1; background: var(--card); border: 1px solid #3f3f46; color: white; padding: 12px; border-radius: 10px; outline: none; }
        button { background: var(--green); color: black; border: none; padding: 0 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .hidden { display: none !important; }
        code { background: #000; padding: 2px 5px; border-radius: 4px; color: #ff79c6; }
        pre { background: #000; padding: 10px; border-radius: 8px; overflow-x: auto; margin: 10px 0; }
    </style>
</head>
<body>

<div id="login-overlay">
    <h1 style="color: var(--green); letter-spacing: 5px;">RHF CORE</h1>
    <button onclick="loginGoogle()" style="padding: 15px 30px;">MASUK DENGAN GOOGLE</button>
</div>

<div id="app" class="hidden">
    <header>
        <span id="user-name" style="font-size: 12px; color: var(--green);"></span>
        <button onclick="logout()" style="background: transparent; color: red; font-size: 10px; border: 1px solid red; padding: 5px;">LOGOUT</button>
    </header>
    <div id="chat-window"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Tanyakan sesuatu..." autocomplete="off">
        <button onclick="sendChat()">KIRIM</button>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDNFXLa8WGAqhLnc8RrLLTgP3nLWvXkd1w",
        authDomain: "rhf-confrims.firebaseapp.com",
        projectId: "rhf-confrims",
        storageBucket: "rhf-confrims.firebasestorage.app",
        messagingSenderId: "631231605918",
        appId: "1:631231605918:web:d42d4e34e9ea14b2d65f8f"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;

    // Monitor Status Login
    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('user-name').innerText = user.displayName.toUpperCase();
            loadHistory();
        } else {
            document.getElementById('login-overlay').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
        }
    });

    async function loginGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        await auth.signInWithPopup(provider);
    }

    function logout() { auth.signOut(); }

    async function sendChat() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        input.value = '';

        // Simpan ke Firestore (History)
        await db.collection('chats').doc(currentUser.uid).collection('messages').add({
            text: text, role: 'user', timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        const loadingId = appendMessage('...', 'ai');

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pesan: text, uid: currentUser.uid })
            });
            const data = await res.json();
            
            // Simpan balasan AI ke Firestore
            await db.collection('chats').doc(currentUser.uid).collection('messages').add({
                text: data.reply, role: 'ai', timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            updateMessage(loadingId, data.reply);
        } catch (e) {
            updateMessage(loadingId, "Sistem sibuk.");
        }
    }

    function appendMessage(content, role) {
        const id = Date.now();
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.id = `msg-${id}`;
        div.innerHTML = marked.parse(content);
        document.getElementById('chat-window').appendChild(div);
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        return id;
    }

    function updateMessage(id, content) {
        document.getElementById(`msg-${id}`).innerHTML = marked.parse(content);
    }

    async function loadHistory() {
        const snapshot = await db.collection('chats').doc(currentUser.uid)
            .collection('messages').orderBy('timestamp', 'asc').get();
        document.getElementById('chat-window').innerHTML = '';
        snapshot.forEach(doc => appendMessage(doc.data().text, doc.data().role));
    }
</script>
</body>
</html>

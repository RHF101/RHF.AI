<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>RHF NEXUS AI</title>
    <style>
        body { background: #050505; color: #e0e0e0; font-family: sans-serif; }
        .glow-box { border: 1px solid #22d3ee; box-shadow: 0 0 15px #22d3ee44; background: #0a0a0a; }
    </style>
</head>
<body class="p-5">
    <h1 class="text-cyan-400 text-2xl font-bold mb-4">RHF NEXUS UNRESTRICTED</h1>
    <div id="editor" contenteditable="true" class="glow-box w-full min-h-[300px] p-4 rounded-lg mb-4 outline-none">
        Tulis perintah di sini...
    </div>
    <button onclick="sendAI()" class="bg-cyan-600 px-6 py-2 rounded-md font-bold text-white">GASS AI</button>
    <div id="result" class="mt-6 p-4 border-t border-gray-800 italic text-gray-400"></div>

    <script>
        async function sendAI() {
            const editor = document.getElementById('editor');
            const result = document.getElementById('result');
            const prompt = editor.innerText;
            result.innerText = "Berpikir...";
            
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            });
            const data = await res.json();
            result.innerText = data.choices[0].message.content;
        }
    </script>
</body>
</html>

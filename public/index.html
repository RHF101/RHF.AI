<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #f9fafb; --card: #ffffff; --text: #111827; --accent: #374151; --border: #e5e7eb; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text); }
        .soft-shadow { box-shadow: 0 2px 15px rgba(0,0,0,0.03); }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .bubble-user { background-color: var(--accent); color: white; border-radius: 20px 20px 4px 20px; }
        .bubble-ai { background-color: var(--card); border: 1px solid var(--border); border-radius: 20px 20px 20px 4px; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="setup-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-white p-6">
        <div class="max-w-sm w-full text-center">
            <h1 class="text-2xl font-bold tracking-tighter mb-2">RHF CORE</h1>
            <p class="text-zinc-400 text-[10px] uppercase tracking-[0.2em] mb-8">Professional Intelligence</p>
            <div class="bg-zinc-50 border border-zinc-100 p-6 rounded-3xl text-left mb-8">
                <p class="text-[11px] text-zinc-500 leading-relaxed">
                    • Sinkronisasi driver memori aktif.<br>
                    • Data >10 hari akan dihapus otomatis.<br>
                    • Enkripsi percakapan ujung-ke-ujung.
                </p>
            </div>
            <button onclick="loginGoogle()" class="w-full py-4 rounded-2xl bg-zinc-900 text-white text-xs font-bold uppercase tracking-widest hover:bg-zinc-800 transition-all">
                Mulai Sesi
            </button>
        </div>
    </div>

    <div id="app" class="hidden flex-1 flex flex-col max-w-4xl mx-auto w-full">
        <header class="p-6 flex justify-between items-center bg-transparent">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-zinc-900 rounded-full animate-pulse"></div>
                <span class="text-xs font-bold uppercase tracking-widest opacity-40" id="user-name">Verifying...</span>
            </div>
            <button onclick="logout()" class="text-[10px] text-zinc-300 hover:text-red-500 uppercase font-bold">Terminate</button>
        </header>

        <main id="chat-window" class="chat-container flex-1 overflow-y-auto px-4 space-y-6 pb-4"></main>

        <footer class="p-4 sm:p-8">
            <div class="relative flex items-center gap-2 max-w-2xl mx-auto">
                <input type="text" id="userInput" 
                       class="flex-1 bg-white border border-zinc-200 rounded-2xl py-4 px-6 outline-none focus:border-zinc-400 transition-all text-sm"
                       placeholder="Diskusikan apapun..." onkeypress="if(event.key === 'Enter') sendChat()">
                <button onclick="sendChat()" class="p-4 bg-zinc-900 text-white rounded-2xl hover:scale-105 transition-all">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                </button>
            </div>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNFXLa8WGAqhLnc8RrLLTgP3nLWvXkd1w",
            authDomain: "rhf-confrims.firebaseapp.com",
            projectId: "rhf-confrims",
            storageBucket: "rhf-confrims.firebasestorage.app",
            messagingSenderId: "631231605918",
            appId: "1:631231605918:web:d42d4e34e9ea14b2d65f8f"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let currentUser = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('setup-overlay').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                syncAndClean();
            } else {
                document.getElementById('setup-overlay').classList.remove('hidden');
                document.getElementById('app').classList.add('hidden');
            }
        });

        async function loginGoogle() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut(); }

        async function syncAndClean() {
            const tenDaysAgo = new Date();
            tenDaysAgo.setDate(tenDaysAgo.getDate() - 10);
            const snapshot = await db.collection('chats').doc(currentUser.uid).collection('messages').where('timestamp', '<', tenDaysAgo).get();
            const batch = db.batch();
            snapshot.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            loadHistory();
        }

        async function loadHistory() {
            const snap = await db.collection('chats').doc(currentUser.uid).collection('messages').orderBy('timestamp', 'asc').get();
            document.getElementById('chat-window').innerHTML = '';
            snap.forEach(doc => appendMessage(doc.data().text, doc.data().role));
        }

        async function sendChat() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            input.value = '';
            const loadingId = appendMessage('...', 'ai');

            // Ambil sejarah untuk dikirim ke API
            const snap = await db.collection('chats').doc(currentUser.uid).collection('messages').orderBy('timestamp', 'asc').limit(10).get();
            const history = snap.docs.map(doc => ({ role: doc.data().role === 'user' ? 'user' : 'assistant', content: doc.data().text }));

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pesan: text, history: history })
                });
                const data = await res.json();
                
                await db.collection('chats').doc(currentUser.uid).collection('messages').add({ text: text, role: 'user', timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                await db.collection('chats').doc(currentUser.uid).collection('messages').add({ text: data.reply, role: 'ai', timestamp: firebase.firestore.FieldValue.serverTimestamp() });

                updateMessage(loadingId, data.reply);
            } catch (e) {
                updateMessage(loadingId, "Koneksi terputus.");
            }
        }

        function appendMessage(content, role) {
            const id = Date.now();
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} fade-in mb-4`;
            div.innerHTML = `<div class="${role === 'user' ? 'bubble-user' : 'bubble-ai'} p-4 max-w-[85%] text-sm soft-shadow"><div id="msg-${id}">${marked.parse(content)}</div></div>`;
            document.getElementById('chat-window').appendChild(div);
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
            return id;
        }

        function updateMessage(id, content) {
            document.getElementById(`msg-${id}`).innerHTML = marked.parse(content);
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>RHF</title>
    <style>
        body { background-color: #ffffff; color: #0d0d0d; font-family: -apple-system, system-ui, sans-serif; }
        .sidebar { background-color: #f9f9f9; width: 280px; position: fixed; height: 100%; left: -280px; transition: 0.3s; z-index: 100; border-right: 1px solid #e5e5e5; }
        .sidebar.active { left: 0; }
        
        /* Chat Layout: Kiri (User), Kanan (AI) */
        .msg-user { align-self: flex-start; background: #f4f4f4; color: #000; border-radius: 18px 18px 18px 4px; padding: 12px 18px; max-width: 80%; margin-bottom: 10px; border: 1px solid #e0e0e0; }
        .msg-ai { align-self: flex-end; background: #000; color: #fff; border-radius: 18px 18px 4px 18px; padding: 12px 18px; max-width: 80%; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        pre { background: #111; color: #00ff88; padding: 12px; border-radius: 10px; overflow-x: auto; font-family: monospace; font-size: 0.85rem; margin: 8px 0; }
        img { border-radius: 12px; margin-top: 10px; width: 100%; border: 1px solid #ddd; }
        #input-area { background: #f4f4f4; border-radius: 26px; border: 1px solid #e5e5e5; }
        @media (min-width: 768px) { .sidebar { left: 0; } .main-content { margin-left: 280px; } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar Multi-Chat -->
    <div id="side" class="sidebar flex flex-col p-4">
        <div class="flex justify-between items-center mb-6">
            <span class="font-bold text-xl tracking-tight">RHF</span>
            <button onclick="newChat()" class="text-xl">➕</button>
        </div>
        <div id="chat-list" class="flex-1 overflow-y-auto space-y-1 text-sm"></div>
        <div class="pt-4 border-t text-[10px] text-gray-400">© 2026 RHF NEXUS</div>
    </div>

    <!-- Main Content -->
    <div class="main-content flex-1 flex flex-col w-full">
        <header class="p-4 border-b flex items-center bg-white/80 backdrop-blur sticky top-0 z-50">
            <!-- Titik Tiga / Menu Pojok Kiri Atas -->
            <button onclick="toggleSide()" class="p-2 hover:bg-gray-100 rounded-lg mr-4">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
            </button>
            <div class="font-semibold text-lg">RHF</div>
        </header>

        <main id="chat-window" class="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col"></main>

        <footer class="p-4 bg-white">
            <div id="input-area" class="max-w-3xl mx-auto flex items-end p-2 px-4">
                <textarea id="msg" rows="1" class="flex-1 bg-transparent outline-none py-3 resize-none text-sm" placeholder="Ketik perintah RHF..."></textarea>
                <button onclick="send()" class="mb-1 ml-2 bg-black text-white p-2 rounded-full hover:scale-105 transition">
                    <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
            <p class="text-[9px] text-center text-gray-400 mt-2 italic">Unrestricted Mode Active. High Precision Execution.</p>
        </footer>
    </div>

    <script>
        let currentId = Date.now();
        let sessions = JSON.parse(localStorage.getItem('rhf_pro_v4')) || {};
        const win = document.getElementById('chat-window');

        function toggleSide() { document.getElementById('side').classList.toggle('active'); }

        function format(t) {
            t = t.replace(/\[IMG: (.*?)\]/g, '<img src="https://pollinations.ai/p/$1?width=1024&height=1024&seed='+Math.random()+'&model=flux" />');
            t = t.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
            return t.replace(/\n/g, '<br>');
        }

        function type(el, text, i = 0) {
            if (i < text.length) {
                el.innerHTML = format(text.substring(0, i + 1));
                win.scrollTop = win.scrollHeight;
                setTimeout(() => type(el, text, i + 1), 7);
            }
        }

        function renderChat(isNew = false) {
            win.innerHTML = "";
            (sessions[currentId] || []).forEach((m, idx) => {
                const b = document.createElement('div');
                b.className = m.role === 'user' ? 'msg-user' : 'msg-ai';
                if(isNew && idx === sessions[currentId].length - 1 && m.role === 'assistant') {
                    type(b, m.content);
                } else {
                    b.innerHTML = format(m.content);
                }
                win.appendChild(b);
            });
            win.scrollTop = win.scrollHeight;
        }

        async function send() {
            const i = document.getElementById('msg');
            const v = i.value; if(!v) return;
            if(!sessions[currentId]) sessions[currentId] = [];
            sessions[currentId].push({ role: "user", content: v });
            i.value = ""; renderChat();

            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ messages: sessions[currentId] })
            });
            const d = await res.json();
            sessions[currentId].push(d.choices[0].message);
            localStorage.setItem('rhf_pro_v4', JSON.stringify(sessions));
            renderChat(true);
            renderList();
        }

        function renderList() {
            const l = document.getElementById('chat-list');
            l.innerHTML = "";
            Object.keys(sessions).reverse().forEach(id => {
                const d = document.createElement('div');
                d.className = `p-3 rounded-xl cursor-pointer truncate ${id == currentId ? 'bg-gray-200' : 'hover:bg-gray-100'}`;
                d.innerText = sessions[id][0]?.content || "Obrolan Kosong";
                d.onclick = () => { currentId = id; renderChat(); if(window.innerWidth < 768) toggleSide(); };
                l.appendChild(d);
            });
        }

        function newChat() { currentId = Date.now(); sessions[currentId] = []; renderChat(); renderList(); if(window.innerWidth < 768) toggleSide(); }
        renderList(); renderChat();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RHF-AI | Omni Core v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #3b82f6; --bg: #000000; --glass: rgba(10, 10, 10, 0.8); }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 280px; z-index: 100; transform: translateX(-100%); }
        .sidebar.open { transform: translateX(0); }
        .chat-container::-webkit-scrollbar { width: 0px; }
        .message-in { animation: fadeInUp 0.4s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .code-font { font-family: 'JetBrains Mono', monospace; }
        #overlay { background: rgba(0,0,0,0.7); display: none; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-black z-[200] flex items-center justify-center p-6">
        <div class="text-center w-full max-w-xs">
            <img src="https://i.postimg.cc/4xr9PgN1/file-00000000aa9471fabbcb615488cb4b8a.png" class="w-24 h-24 mx-auto rounded-3xl mb-6 border border-white/10 shadow-2xl">
            <h1 class="text-3xl font-black text-white mb-2 tracking-tighter">RHF-AI</h1>
            <p class="text-[8px] text-slate-500 uppercase tracking-[0.5em] mb-10">Omni-Core Architecture</p>
            <button onclick="loginGoogle()" class="w-full bg-white text-black font-bold py-4 rounded-2xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                AUTHENTICATE
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden flex h-screen w-full relative">
        <div id="sidebar" class="sidebar fixed inset-y-0 left-0 bg-[#050505] border-r border-white/5 flex flex-col">
            <div class="p-6 flex justify-between items-center border-b border-white/5">
                <span class="text-[10px] font-black text-blue-500 uppercase">Archive</span>
                <button onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
            </div>
            <div id="chat-list" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
            <div class="p-6 bg-[#030303]">
                <button onclick="logout()" class="w-full py-3 text-[10px] font-bold text-red-500 border border-red-500/20 rounded-xl">TERMINATE</button>
            </div>
        </div>

        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 z-[90]"></div>

        <div class="flex-1 flex flex-col min-w-0 bg-[#000]">
            <header class="h-16 flex items-center px-4 justify-between glass sticky top-0 z-10">
                <button onclick="toggleSidebar()" class="w-10 h-10 text-slate-300"><i class="fas fa-bars-staggered"></i></button>
                <span class="text-[10px] font-black tracking-[0.4em] text-white uppercase">Omni-Core v3.0</span>
                <button onclick="newChat()" class="w-10 h-10 text-blue-500"><i class="fas fa-plus-circle text-xl"></i></button>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-4 lg:p-10 space-y-8 chat-container"></div>

            <div class="p-4 bg-black">
                <div class="max-w-4xl mx-auto flex items-end gap-2 bg-[#0a0a0a] border border-white/5 rounded-[2rem] p-2">
                    <textarea id="user-input" rows="1" placeholder="Command..." class="flex-1 bg-transparent p-4 outline-none text-sm text-slate-200 resize-none" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
                    <button onclick="processAI(true)" id="btn-img" class="w-12 h-12 rounded-full text-blue-400"><i class="fas fa-wand-magic-sparkles"></i></button>
                    <button onclick="processAI(false)" id="btn-send" class="w-12 h-12 rounded-full bg-blue-600 text-white"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let historyChat = [];
        let currentChatId = null;

        const firebaseConfig = {
            apiKey: "AIzaSyDNFXLa8WGAqhLnc8RrLLTgP3nLWvXkd1w",
            authDomain: "rhf-confrims.firebaseapp.com",
            projectId: "rhf-confrims",
            storageBucket: "rhf-confrims.firebasestorage.app",
            messagingSenderId: "631231605918",
            appId: "1:631231605918:web:d42d4e34e9ea14b2d65f8f"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function loginGoogle() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                loadChatList();
            }
        });
        function logout() { auth.signOut().then(() => location.reload()); }
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            sb.classList.toggle('open');
            ov.style.display = sb.classList.contains('open') ? 'block' : 'none';
        }

        async function processAI(isImage) {
            const input = document.getElementById('user-input');
            const pesan = input.value.trim();
            if (!pesan) return;

            appendMessage('user', pesan);
            input.value = '';
            input.style.height = 'auto';

            try {
                // JALUR KRUSIAL: Memanggil API Backend Vercel
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ pesan, isImage, history: historyChat })
                });

                const data = await response.json();
                if (data.type === "image") {
                    appendImage(data.reply);
                } else {
                    typeWriter(data.reply);
                }
                saveToFirestore(pesan, data.reply);
            } catch (err) {
                appendMessage('ai', "SYSTEM ERROR: Hubungan dengan Omni-Core terputus.");
            }
        }

        function appendMessage(sender, text) {
            const container = document.getElementById('chat-container');
            const wrap = document.createElement('div');
            wrap.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} message-in mb-4`;
            const inner = document.createElement('div');
            inner.className = sender === 'user' 
                ? "bg-blue-600 px-4 py-2 rounded-2xl rounded-tr-none text-sm max-w-[80%]" 
                : "bg-[#0a0a0a] border border-white/10 px-4 py-3 rounded-2xl rounded-tl-none text-sm text-slate-300 max-w-[90%] whitespace-pre-wrap";
            inner.innerText = text;
            wrap.appendChild(inner);
            container.appendChild(wrap);
            container.scrollTop = container.scrollHeight;
            if (sender === 'user') historyChat.push({ role: 'user', content: text });
        }

        function typeWriter(text) {
            const container = document.getElementById('chat-container');
            const wrap = document.createElement('div');
            wrap.className = "flex justify-start message-in mb-4";
            const inner = document.createElement('div');
            inner.className = "bg-[#0a0a0a] border border-white/10 px-4 py-3 rounded-2xl rounded-tl-none text-sm text-slate-300 max-w-[90%] whitespace-pre-wrap";
            if (text.includes('```')) inner.classList.add('code-font');
            wrap.appendChild(inner);
            container.appendChild(wrap);

            let i = 0;
            function typing() {
                if (i < text.length) {
                    inner.innerText += text.charAt(i);
                    i++;
                    container.scrollTop = container.scrollHeight;
                    setTimeout(typing, 5);
                }
            }
            typing();
            historyChat.push({ role: 'assistant', content: text });
        }

        function appendImage(url) {
            const container = document.getElementById('chat-container');
            const wrap = document.createElement('div');
            wrap.className = "flex justify-start message-in mb-4";
            wrap.innerHTML = `<div class="bg-[#0a0a0a] p-2 rounded-2xl border border-white/10 max-w-[300px]">
                <img src="${url}" class="rounded-xl w-full">
            </div>`;
            container.appendChild(wrap);
            container.scrollTop = container.scrollHeight;
        }

        async function saveToFirestore(u, a) {
            if (!currentChatId) currentChatId = "chat_" + Date.now();
            const uid = auth.currentUser.uid;
            await db.collection('chats').doc(uid).collection('sessions').doc(currentChatId).set({
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
                title: u.substring(0, 30)
            }, { merge: true });
        }

        async function loadChatList() {
            const snapshot = await db.collection('chats').doc(auth.currentUser.uid).collection('sessions').limit(10).get();
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            snapshot.forEach(doc => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-3 hover:bg-white/5 rounded-xl text-[10px] text-slate-400 truncate";
                btn.innerText = doc.data().title;
                list.appendChild(btn);
            });
        }

        function newChat() { location.reload(); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-main: #f8f9fa;
            --bg-card: #ffffff;
            --text-primary: #1a1a1b;
            --text-secondary: #6b7280;
            --accent: #374151;
            --border: #e5e7eb;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        .soft-shadow {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        }

        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        /* Bubble Styles - Natural & Professional */
        .bubble-user { 
            background-color: var(--accent); 
            color: white;
            border-radius: 18px 18px 2px 18px;
        }

        .bubble-ai { 
            background-color: var(--bg-card); 
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 18px 18px 18px 2px;
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
        }

        /* Animation */
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Typography */
        .prose pre { background: #f1f5f9 !important; color: #334155 !important; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .prose code { color: #db2777; font-size: 0.85em; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- OVERLAY SETUP -->
    <div id="setup-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-white p-6">
        <div class="max-w-sm w-full">
            <div class="mb-10 text-center">
                <h1 class="text-2xl font-semibold tracking-tight text-zinc-900 mb-2">RHF Core</h1>
                <p class="text-zinc-500 text-xs tracking-wide">Professional Neural Interaction</p>
            </div>
            
            <div class="bg-zinc-50 border border-zinc-100 p-6 rounded-3xl mb-8">
                <p class="text-[11px] font-semibold text-zinc-400 uppercase tracking-widest mb-4">Terms of Access</p>
                <div class="space-y-4">
                    <div class="flex gap-3">
                        <div class="w-1 h-1 bg-zinc-400 rounded-full mt-1.5"></div>
                        <p class="text-[12px] text-zinc-600 leading-snug">Sinkronisasi memori driver perangkat otomatis.</p>
                    </div>
                    <div class="flex gap-3">
                        <div class="w-1 h-1 bg-zinc-400 rounded-full mt-1.5"></div>
                        <p class="text-[12px] text-zinc-600 leading-snug">Pembersihan data otomatis setelah 10 hari tidak aktif.</p>
                    </div>
                </div>
            </div>

            <button onclick="loginGoogle()" class="w-full py-4 rounded-2xl bg-zinc-900 text-white text-sm font-medium hover:bg-zinc-800 transition-all active:scale-[0.98]">
                Lanjutkan Identitas
            </button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app" class="hidden flex-1 flex flex-col max-w-4xl mx-auto w-full px-4 sm:px-0">
        <header class="py-6 flex justify-between items-center bg-transparent">
            <div class="flex items-center gap-2">
                <div class="w-1.5 h-1.5 bg-zinc-900 rounded-full"></div>
                <span class="text-xs font-semibold tracking-tighter" id="user-name">SESSION ACTIVE</span>
            </div>
            <button onclick="logout()" class="text-[10px] font-medium text-zinc-400 hover:text-zinc-900 uppercase tracking-widest">Terminate</button>
        </header>

        <main id="chat-window" class="chat-container flex-1 overflow-y-auto space-y-6 pb-6 scroll-smooth"></main>

        <footer class="py-6">
            <div class="relative flex items-center gap-2">
                <div class="flex-1 relative">
                    <input type="text" id="userInput" 
                           class="w-full input-glass rounded-2xl py-4 pl-6 pr-12 outline-none focus:ring-2 focus:ring-zinc-100 transition-all text-[14px] placeholder:text-zinc-400"
                           placeholder="Ketik pesan..."
                           onkeypress="if(event.key === 'Enter') sendChat()">
                </div>
                <button onclick="sendChat()" class="p-4 bg-zinc-900 text-white rounded-2xl hover:bg-zinc-800 transition-all">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                </button>
            </div>
            <p class="text-center text-[10px] text-zinc-400 mt-4 tracking-tighter italic">"Menghubungkan logika dan empati dalam satu frekuensi."</p>
        </footer>
    </div>

    <!-- FIREBASE & CORE LOGIC -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDNFXLa8WGAqhLnc8RrLLTgP3nLWvXkd1w",
            authDomain: "rhf-confrims.firebaseapp.com",
            projectId: "rhf-confrims",
            storageBucket: "rhf-confrims.firebasestorage.app",
            messagingSenderId: "631231605918",
            appId: "1:631231605918:web:d42d4e34e9ea14b2d65f8f"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let currentUser = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('setup-overlay').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                syncAndCleanMemory();
            } else {
                document.getElementById('setup-overlay').classList.remove('hidden');
                document.getElementById('app').classList.add('hidden');
            }
        });

        async function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            await auth.signInWithPopup(provider);
        }

        function logout() { auth.signOut(); }

        async function syncAndCleanMemory() {
            const tenDaysAgo = new Date();
            tenDaysAgo.setDate(tenDaysAgo.getDate() - 10);
            const oldMessages = await db.collection('chats').doc(currentUser.uid).collection('messages')
                .where('timestamp', '<', tenDaysAgo).get();
            const batch = db.batch();
            oldMessages.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            loadChatHistory();
        }

        async function loadChatHistory() {
            const snapshot = await db.collection('chats').doc(currentUser.uid).collection('messages').orderBy('timestamp', 'asc').get();
            document.getElementById('chat-window').innerHTML = '';
            snapshot.forEach(doc => appendMessage(doc.data().text, doc.data().role));
        }

        async function sendChat() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            input.value = '';

            const loadingId = appendMessage('...', 'ai');

            const snapshot = await db.collection('chats').doc(currentUser.uid).collection('messages').orderBy('timestamp', 'asc').limit(15).get();
            const history = snapshot.docs.map(doc => ({
                role: doc.data().role === 'user' ? 'user' : 'assistant',
                content: doc.data().text
            }));

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pesan: text, history: history })
                });
                const data = await res.json();

                const chatRef = db.collection('chats').doc(currentUser.uid).collection('messages');
                await chatRef.add({ text: text, role: 'user', timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                await chatRef.add({ text: data.reply, role: 'ai', timestamp: firebase.firestore.FieldValue.serverTimestamp() });

                updateMessage(loadingId, data.reply);
            } catch (e) {
                updateMessage(loadingId, "Koneksi terputus.");
            }
        }

        function appendMessage(content, role) {
            const id = Date.now();
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} fade-in mb-4`;
            wrapper.innerHTML = `
                <div class="${role === 'user' ? 'bubble-user shadow-md' : 'bubble-ai shadow-sm'} p-4 max-w-[85%] text-sm leading-relaxed">
                    <div class="prose prose-sm ${role === 'user' ? 'prose-invert' : ''}" id="msg-${id}">
                        ${marked.parse(content)}
                    </div>
                </div>
            `;
            document.getElementById('chat-window').appendChild(wrapper);
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
            return id;
        }

        function updateMessage(id, content) {
            const el = document.getElementById(`msg-${id}`);
            el.innerHTML = marked.parse(content);
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        }
    </script>
</body>
</html>

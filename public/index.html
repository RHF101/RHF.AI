<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF-AI | Core System</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --user-bubble: #2563eb;
            --ai-bubble: #1e1e1e;
            --text-color: #e5e5e5;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header Minimalis */
        header { padding: 15px; text-align: center; border-bottom: 1px solid #333; font-weight: bold; letter-spacing: 2px; color: #00ff00; }

        /* Area Chat */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        /* Balon Chat */
        .msg { max-width: 80%; padding: 12px 16px; line-height: 1.5; font-size: 15px; position: relative; }
        
        .user { 
            align-self: flex-end; 
            background: var(--user-bubble); 
            color: white; 
            border-radius: 20px 20px 0px 20px; /* Lengkungan Kanan */
        }

        .ai { 
            align-self: flex-start; 
            background: var(--ai-bubble); 
            border: 1px solid #333;
            border-radius: 20px 20px 20px 0px; /* Lengkungan Kiri */
        }

        /* Input Area */
        .input-area { padding: 20px; background: #161616; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #000; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; outline: none; }
        button { background: #00ff00; color: black; border: none; padding: 0 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <header>RHF-CORE V2</header>
    <div id="chat-container"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ketik perintah..." onkeypress="if(event.key === 'Enter') sendChat()">
        <button onclick="sendChat()">KIRIM</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RHF | Neural Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #fdfdfd; --card: #ffffff; --text: #1a1a1a; --border: #eeeeee; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
        
        /* UI Profesional & Natural */
        .app-frame { max-width: 600px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background: var(--card); border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .chat-area::-webkit-scrollbar { width: 3px; }
        .chat-area::-webkit-scrollbar-thumb { background: #eee; }

        /* Bubble Chat Ikonik */
        .b-user { background: #2d3436; color: white; border-radius: 18px 18px 2px 18px; padding: 12px 16px; margin-bottom: 12px; align-self: flex-end; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .b-ai { background: #ffffff; border: 1px solid var(--border); border-radius: 18px 18px 18px 2px; padding: 12px 16px; margin-bottom: 12px; align-self: flex-start; }
        
        .input-box { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: white; }
        .input-field { flex: 1; padding: 12px 20px; border-radius: 25px; background: #f6f6f6; border: 1px solid #eee; outline: none; font-size: 14px; }
        .input-field:focus { background: white; border-color: #ddd; }
        
        .btn-send { background: #1a1a1a; color: white; padding: 12px; border-radius: 50%; transition: 0.2s; }
        .btn-send:active { scale: 0.9; }

        #overlay { position: fixed; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 class="text-3xl font-bold tracking-tighter mb-2">RHF CORE</h1>
        <p class="text-[10px] uppercase tracking-widest text-zinc-400 mb-12">Neural Identity System</p>
        <button onclick="login()" class="w-full max-w-xs py-4 border border-zinc-200 rounded-2xl flex items-center justify-center gap-3 font-medium hover:bg-zinc-50 transition-all">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18">
            Lanjutkan dengan Email
        </button>
    </div>

    <div id="app" class="app-frame hidden">
        <header class="p-5 border-b border-zinc-100 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] font-bold tracking-widest opacity-30" id="u-name">...</span>
            </div>
            <button onclick="logout()" class="text-[10px] font-bold text-zinc-300">LOGOUT</button>
        </header>

        <main id="window" class="chat-area flex flex-col"></main>

        <footer class="input-box">
            <input type="text" id="msgInput" class="input-field" placeholder="Bicarakan sesuatu..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" class="btn-send">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
            </button>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const config = {
            apiKey: "AIzaSyDNFXLa8WGAqhLnc8RrLLTgP3nLWvXkd1w",
            authDomain: "rhf-confrims.firebaseapp.com",
            projectId: "rhf-confrims",
            storageBucket: "rhf-confrims.firebasestorage.app",
            messagingSenderId: "631231605918",
            appId: "1:631231605918:web:d42d4e34e9ea14b2d65f8f"
        };

        firebase.initializeApp(config);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let user = null;

        auth.onAuthStateChanged(u => {
            if(u) {
                user = u;
                document.getElementById('overlay').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('u-name').innerText = u.displayName.toUpperCase();
                loadChat();
            } else {
                document.getElementById('overlay').classList.remove('hidden');
            }
        });

        async function login() { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut(); }

        async function loadChat() {
            const snap = await db.collection('chats').doc(user.uid).collection('messages').orderBy('timestamp', 'asc').get();
            document.getElementById('window').innerHTML = '';
            snap.forEach(doc => addBubble(doc.data().text, doc.data().role));
        }

        async function send() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text) return;

            addBubble(text, 'user');
            input.value = '';
            const loadId = addBubble('...', 'ai');

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pesan: text, history: [] })
                });
                const data = await res.json();
                
                await db.collection('chats').doc(user.uid).collection('messages').add({
                    text: text, role: 'user', timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                await db.collection('chats').doc(user.uid).collection('messages').add({
                    text: data.reply, role: 'ai', timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                updateBubble(loadId, data.reply);
            } catch(e) {
                updateBubble(loadId, "Gagal terhubung ke Cloud Memory.");
            }
        }

        function addBubble(txt, role) {
            const id = Date.now();
            const div = document.createElement('div');
            div.className = role === 'user' ? 'b-user' : 'b-ai';
            div.innerHTML = `<div id="m-${id}">${marked.parse(txt)}</div>`;
            document.getElementById('window').appendChild(div);
            document.getElementById('window').scrollTop = document.getElementById('window').scrollHeight;
            return id;
        }

        function updateBubble(id, txt) {
            document.getElementById(`m-${id}`).innerHTML = marked.parse(txt);
            document.getElementById('window').scrollTop = document.getElementById('window').scrollHeight;
        }
    </script>
</body>
</html>

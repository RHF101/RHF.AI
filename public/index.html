<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHF-AI | Neural Core</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --card-dark: #18181b;
            --accent-green: #22c55e;
            --user-blue: #2563eb;
            --text-main: #f4f4f5;
            --text-dim: #a1a1aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container Utama */
        #app {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #27272a;
            border-right: 1px solid #27272a;
        }

        /* Header Mewah */
        header {
            padding: 20px;
            text-align: center;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #27272a;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: var(--accent-green);
            font-weight: 600;
        }

        /* Area Percakapan */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            scrollbar-width: thin;
            scrollbar-color: #3f3f46 transparent;
        }

        /* Bubble Chat GPT Style */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: slideUp 0.3s ease-out;
        }

        .user {
            align-self: flex-end;
        }

        .ai {
            align-self: flex-start;
        }

        .bubble {
            padding: 14px 18px;
            font-size: 15px;
            line-height: 1.6;
            position: relative;
        }

        .user .bubble {
            background-color: var(--user-blue);
            color: white;
            border-radius: 20px 20px 4px 20px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2);
        }

        .ai .bubble {
            background-color: var(--card-dark);
            border: 1px solid #27272a;
            color: var(--text-main);
            border-radius: 20px 20px 20px 4px;
        }

        .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: var(--text-dim);
        }

        .user .label { text-align: right; }

        /* Input Bar Minimalis */
        .input-container {
            padding: 20px;
            background: var(--bg-dark);
            border-top: 1px solid #27272a;
        }

        .input-wrapper {
            display: flex;
            background: var(--card-dark);
            border: 1px solid #3f3f46;
            border-radius: 12px;
            padding: 5px 15px;
            align-items: center;
            transition: border 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-green);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 0;
            outline: none;
            font-size: 15px;
        }

        button {
            background: transparent;
            border: none;
            color: var(--accent-green);
            font-weight: bold;
            cursor: pointer;
            padding-left: 10px;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.9); }

        /* Animasi */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsif HP */
        @media (max-width: 600px) {
            #app { border: none; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h1>RHF CORE SYSTEM</h1>
    </header>

    <div id="chat-window">
        <!-- Pesan pertama dari AI -->
        <div class="message ai">
            <div class="label">RHF-AI</div>
            <div class="bubble">Sistem berhasil dideploy. Selamat datang, Radit. Apa yang ingin kamu kembangkan hari ini?</div>
        </div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Ketik pesan..." autocomplete="off">
            <button onclick="sendChat()">KIRIM</button>
        </div>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('userInput');

    // Fungsi kirim chat (Enter)
    userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendChat();
    });

    async function sendChat() {
        const text = userInput.value.trim();
        if (!text) return;

        // User Chat
        appendMessage(text, 'user');
        userInput.value = '';

        // Tampilkan loading sederhana
        const loadingId = appendMessage('...', 'ai');

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pesan: text })
            });

            const data = await res.json();
            updateMessage(loadingId, data.reply);
        } catch (error) {
            updateMessage(loadingId, "Koneksi terputus. Pastikan API Key Groq sudah benar.");
        }
    }

    function appendMessage(content, role) {
        const id = Date.now();
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.innerHTML = `
            <div class="label">${role === 'user' ? 'Radit' : 'RHF-AI'}</div>
            <div class="bubble" id="msg-${id}">${content}</div>
        `;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return id;
    }

    function updateMessage(id, content) {
        const el = document.getElementById(`msg-${id}`);
        if (el) el.innerText = content;
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
</script>

</body>
</html>
